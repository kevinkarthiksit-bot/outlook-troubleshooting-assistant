<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Outlook Troubleshooting Assistant</title>
  <style>
/* Outlook Troubleshooting Assistant - Multi-theme styles */

:root,
[data-theme="light"] {
  --bg: #eef3f9;
  --bg-glow: radial-gradient(1200px 500px at 10% -10%, rgba(0, 120, 212, 0.14), transparent 55%),
    radial-gradient(900px 400px at 90% 0%, rgba(135, 100, 184, 0.1), transparent 50%);
  --surface: #ffffff;
  --surface-alt: #f3f6fb;
  --text: #1a2332;
  --text-muted: #5a6578;
  --primary: #0078d4;
  --primary-hover: #106ebe;
  --accent: #107c10;
  --border: #d5dde8;
  --shadow: 0 4px 18px rgba(16, 40, 72, 0.08);
  --shadow-sm: 0 1px 4px rgba(16, 40, 72, 0.06);
  --shadow-lg: 0 12px 32px rgba(16, 40, 72, 0.12);
  --radius: 10px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --focus-ring: 0 0 0 3px color-mix(in srgb, var(--primary) 35%, transparent);
  --badge-best: #0078d4;
  --badge-related: #8764b8;
  --badge-try: #797775;
  --danger: #d13438;
  --header-bg: linear-gradient(135deg, #0078d4 0%, #005a9e 58%, #0b4f8a 100%);
  --header-text: #ffffff;
  --instruction-bg: linear-gradient(160deg, #e8f4fd 0%, #f4f9fd 100%);
  --instruction-border: #b3d9f2;
}

[data-theme="dark"] {
  --bg: #151519;
  --bg-glow: radial-gradient(1000px 420px at 8% -8%, rgba(77, 163, 255, 0.16), transparent 55%),
    radial-gradient(800px 360px at 92% 0%, rgba(180, 160, 255, 0.1), transparent 50%);
  --surface: #222228;
  --surface-alt: #2b2b32;
  --text: #f0f0f5;
  --text-muted: #a0a0ab;
  --primary: #4da3ff;
  --primary-hover: #7bb8ff;
  --accent: #6ccb5f;
  --border: #3a3a44;
  --shadow: 0 6px 22px rgba(0, 0, 0, 0.45);
  --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.35);
  --shadow-lg: 0 14px 36px rgba(0, 0, 0, 0.55);
  --radius: 10px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --focus-ring: 0 0 0 3px color-mix(in srgb, var(--primary) 45%, transparent);
  --badge-best: #4da3ff;
  --badge-related: #b4a0ff;
  --badge-try: #9a9aa5;
  --danger: #ff6b6b;
  --header-bg: linear-gradient(135deg, #2f3038 0%, #1b1b1f 100%);
  --header-text: #f0f0f5;
  --instruction-bg: linear-gradient(160deg, #1a2a3a 0%, #1f2733 100%);
  --instruction-border: #2a4a6a;
}

[data-theme="high-contrast"] {
  --bg: #000000;
  --bg-glow: none;
  --surface: #000000;
  --surface-alt: #1a1a1a;
  --text: #ffffff;
  --text-muted: #ffff00;
  --primary: #ffff00;
  --primary-hover: #ffffff;
  --accent: #00ff00;
  --border: #ffffff;
  --shadow: none;
  --shadow-sm: none;
  --shadow-lg: none;
  --radius: 10px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --focus-ring: 0 0 0 3px #ffff00;
  --badge-best: #00ff00;
  --badge-related: #ffff00;
  --badge-try: #ffffff;
  --danger: #ff0000;
  --header-bg: #000000;
  --header-text: #ffff00;
  --instruction-bg: #000000;
  --instruction-border: #ffff00;
}

[data-theme="corporate"] {
  --bg: #ebf0f5;
  --bg-glow: radial-gradient(1000px 420px at 8% -8%, rgba(0, 75, 135, 0.12), transparent 55%);
  --surface: #ffffff;
  --surface-alt: #e8edf2;
  --text: #2c3e50;
  --text-muted: #607d8b;
  --primary: #004b87;
  --primary-hover: #003660;
  --accent: #008272;
  --border: #c5d0dc;
  --shadow: 0 3px 14px rgba(0, 75, 135, 0.1);
  --shadow-sm: 0 1px 4px rgba(0, 75, 135, 0.08);
  --shadow-lg: 0 12px 28px rgba(0, 75, 135, 0.14);
  --radius: 10px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --focus-ring: 0 0 0 3px color-mix(in srgb, var(--primary) 35%, transparent);
  --badge-best: #004b87;
  --badge-related: #008272;
  --badge-try: #607d8b;
  --danger: #c0392b;
  --header-bg: linear-gradient(135deg, #004b87 0%, #002d52 100%);
  --header-text: #ffffff;
  --instruction-bg: linear-gradient(160deg, #e6f0f8 0%, #f2f6fa 100%);
  --instruction-border: #b7c9da;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: var(--bg);
  background-image: var(--bg-glow);
  background-attachment: fixed;
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a {
  color: var(--primary);
}

:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
}

/* Header */
.app-header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 1.1rem 1.5rem 1.2rem;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 0;
  z-index: 40;
  backdrop-filter: saturate(1.1);
}

.app-header h1 {
  margin: 0;
  font-size: 1.35rem;
  font-weight: 650;
  letter-spacing: -0.01em;
}

.app-header .subtitle {
  margin: 0.2rem 0 0;
  opacity: 0.92;
  font-size: 0.88rem;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.user-display {
  font-size: 0.85rem;
  opacity: 0.95;
}

.theme-switcher {
  display: flex;
  gap: 0.35rem;
}

.theme-switcher button {
  padding: 0.35rem 0.6rem;
  border: 1px solid rgba(255, 255, 255, 0.4);
  background: rgba(255, 255, 255, 0.15);
  color: inherit;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.75rem;
}

.theme-switcher button.active,
.theme-switcher button:hover {
  background: rgba(255, 255, 255, 0.3);
}

/* Subtle theme picker dropdown */
.theme-picker {
  position: relative;
}

.theme-picker-toggle {
  padding: 0.35rem 0.75rem;
  border: 1px solid rgba(255, 255, 255, 0.35);
  background: rgba(255, 255, 255, 0.08);
  color: inherit;
  border-radius: 999px;
  cursor: pointer;
  font-size: 0.8rem;
  opacity: 0.9;
}

.theme-picker-toggle:hover {
  opacity: 1;
  background: rgba(255, 255, 255, 0.16);
}

.theme-picker-menu {
  position: absolute;
  top: calc(100% + 0.35rem);
  right: 0;
  min-width: 150px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  z-index: 100;
  overflow: hidden;
}

.theme-picker-menu button {
  display: block;
  width: 100%;
  padding: 0.6rem 0.9rem;
  border: none;
  background: var(--surface);
  color: var(--text);
  text-align: left;
  cursor: pointer;
  font-size: 0.85rem;
}

.theme-picker-menu button:hover,
.theme-picker-menu button.active {
  background: color-mix(in srgb, var(--primary) 10%, var(--surface-alt));
  color: var(--primary);
}

.login-header .theme-picker-menu,
.app-header .theme-picker-menu {
  color: var(--text);
}

.session-summary {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin: -0.5rem 0 1rem;
  padding: 0.5rem 0.75rem;
  background: var(--surface-alt);
  border-radius: 4px;
}

.session-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  padding: 0.7rem 0.85rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}

.session-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.32rem 0.7rem;
  border-radius: 999px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  font-size: 0.8rem;
  color: var(--text);
}

.session-badge-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-muted);
}

.btn-header {
  padding: 0.35rem 0.65rem;
  font-size: 0.8rem;
}

.admin-link {
  color: inherit;
  text-decoration: none;
  padding: 0.4rem 0.8rem;
  border: 1px solid rgba(255, 255, 255, 0.42);
  border-radius: 999px;
  font-size: 0.82rem;
  font-weight: 500;
  transition: background 0.15s, border-color 0.15s;
}

.admin-link:hover {
  background: rgba(255, 255, 255, 0.18);
  border-color: rgba(255, 255, 255, 0.65);
}

/* Layout */
.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 1.6rem 1.5rem 2.5rem;
}

.status-bar {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
  padding: 0.55rem 0.85rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
}

.status-bar.error {
  color: var(--danger);
}

/* Employee prompt */
.employee-prompt {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}

.employee-prompt label {
  display: block;
  margin-bottom: 0.5rem;
  font-weight: 600;
}

.employee-prompt .row {
  display: flex;
  gap: 0.5rem;
}

.employee-prompt input {
  flex: 1;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
}

/* Search */
.search-section {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 1.5rem 1.6rem;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 1.25rem;
}

.search-section h2 {
  margin: 0 0 0.75rem;
  font-size: 1.2rem;
}

.search-section-header {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  justify-content: space-between;
  gap: 0.5rem 1rem;
  margin-bottom: 1rem;
}

.search-section-header h2 {
  margin: 0;
  font-size: 1.3rem;
  font-weight: 650;
}

.result-count {
  margin: 0;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.result-count strong {
  color: var(--text);
  font-weight: 600;
}

.search-box {
  display: flex;
  gap: 0.55rem;
  align-items: stretch;
}

.search-box input {
  flex: 1;
  padding: 1rem 1.15rem;
  font-size: 1.12rem;
  min-height: 3.25rem;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
}

.search-box input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: var(--focus-ring);
}

/* Buttons */
.btn {
  padding: 0.65rem 1.05rem;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 14px color-mix(in srgb, var(--primary) 28%, transparent);
}

.btn-primary:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--surface-alt);
  border-color: color-mix(in srgb, var(--primary) 30%, var(--border));
}

.btn-danger {
  background: var(--danger);
  color: #fff;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Chips */
.chip-section {
  margin-bottom: 1.25rem;
}

.chip-section h3 {
  margin: 0 0 0.5rem;
  font-size: 0.95rem;
  color: var(--text-muted);
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.flow-chip,
.category-chip {
  padding: 0.48rem 0.9rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 999px;
  cursor: pointer;
  font-size: 0.84rem;
  font-weight: 500;
  box-shadow: var(--shadow-sm);
  transition: all 0.15s;
}

.flow-chip:hover,
.category-chip:hover {
  border-color: var(--cat-accent, var(--primary));
  background: color-mix(in srgb, var(--cat-accent, var(--primary)) 10%, var(--surface));
}

.category-chip[data-cat],
.flow-chip[data-cat] {
  border-color: color-mix(in srgb, var(--cat-accent, var(--border)) 45%, var(--border));
}

/* Results */
.results-section {
  margin-bottom: 1.25rem;
}

.result-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.65rem;
}

/* Hard cap: never show more than 6 KB/guide cards unless expanded */
.result-grid:not(.result-grid-expanded) > .result-card:nth-child(n + 7) {
  display: none !important;
}

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--cat-accent, var(--border));
  border-radius: var(--radius-sm);
  padding: 0.7rem 0.8rem;
  margin-bottom: 0;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.result-card:hover {
  border-color: var(--cat-accent, var(--primary));
  border-left-color: var(--cat-accent, var(--primary));
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.result-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-bottom: 0.35rem;
  align-items: center;
}

.kb-id {
  font-family: Consolas, monospace;
  font-size: 0.7rem;
  color: var(--primary);
  font-weight: 600;
}

.match-badge {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 10px;
  background: var(--badge-best);
  color: #fff;
  font-weight: 600;
}

.result-card:nth-child(2) .match-badge {
  background: var(--badge-related);
}

.result-card:nth-child(n + 3) .match-badge {
  background: var(--badge-try);
}

.category-tag {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.category-line {
  margin: 0.25rem 0 0;
}

.category-line .category-tag {
  display: inline-block;
  padding: 0.1rem 0.4rem;
  border-radius: 999px;
  font-size: 0.68rem;
  background: color-mix(in srgb, var(--cat-accent, var(--surface-alt)) 12%, var(--surface-alt));
  border: 1px solid color-mix(in srgb, var(--cat-accent, var(--border)) 35%, var(--border));
  color: var(--text);
  font-weight: 500;
}

.symptom-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  margin-top: 0.4rem;
}

.symptom-tag {
  font-size: 0.62rem;
  padding: 0.1rem 0.35rem;
  border-radius: 4px;
  background: var(--surface-alt);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.result-card h3 {
  margin: 0;
  font-size: 0.86rem;
  line-height: 1.3;
  font-weight: 600;
}

.show-all-results-btn {
  display: block;
  margin: 0.85rem auto 0;
}

@media (max-width: 900px) {
  .result-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

.symptoms {
  margin: 0.5rem 0 0;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.no-results {
  text-align: center;
  padding: 2.4rem 1.5rem;
  color: var(--text-muted);
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--primary) 4%, var(--surface)) 0%, var(--surface) 100%);
  border-radius: var(--radius);
  border: 1px dashed color-mix(in srgb, var(--primary) 25%, var(--border));
  box-shadow: var(--shadow-sm);
}

.no-results p {
  margin: 0 0 1rem;
  font-size: 0.98rem;
}

/* Panels */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow);
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 1rem;
}

.panel-header h2 {
  margin: 0;
  font-size: 1.15rem;
}

.panel-close {
  background: var(--surface-alt);
  border: 1px solid var(--border);
  width: 2rem;
  height: 2rem;
  border-radius: 999px;
  font-size: 1.15rem;
  cursor: pointer;
  color: var(--text-muted);
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}

.panel-close:hover {
  background: var(--surface);
  color: var(--text);
}

.article-meta {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 1rem;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.article-steps {
  padding-left: 1.25rem;
}

.article-steps li {
  margin-bottom: 0.5rem;
}

.feedback-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

.feedback-row span {
  font-size: 0.9rem;
  color: var(--text-muted);
}

/* Flow wizard */
.flow-option {
  display: block;
  width: 100%;
  text-align: left;
  padding: 0.85rem 1rem;
  margin-bottom: 0.55rem;
  border: 1px solid var(--border);
  background: var(--surface-alt);
  color: var(--text);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.95rem;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
}

.flow-option:hover {
  border-color: var(--primary);
  background: var(--surface);
  transform: translateX(2px);
}

.flow-kb-card {
  display: block;
  width: 100%;
  text-align: left;
  padding: 0.9rem 1rem;
  margin-top: 0.5rem;
  margin-bottom: 0.55rem;
  background: var(--surface);
  color: var(--text);
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid var(--border);
  border-left: 3px solid var(--primary);
  box-shadow: var(--shadow-sm);
  transition: transform 0.12s, box-shadow 0.15s, border-color 0.15s;
}

.flow-kb-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
  border-color: color-mix(in srgb, var(--primary) 35%, var(--border));
}

#flowKbResults h4 {
  margin: 1rem 0 0.5rem;
  font-size: 0.95rem;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: color-mix(in srgb, var(--text) 92%, #000);
  color: var(--surface);
  padding: 0.8rem 1.3rem;
  border-radius: 999px;
  font-size: 0.9rem;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  z-index: 1000;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* Admin page */
.admin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.25rem;
  margin-bottom: 1.5rem;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.stat-card .value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary);
}

.stat-card .label {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.banner {
  padding: 0.75rem 1rem;
  border-radius: 6px;
  margin-bottom: 1rem;
  font-size: 0.9rem;
}

.banner.info {
  background: var(--surface-alt);
  border: 1px solid var(--border);
}

.banner.warn {
  background: #fff3cd;
  border: 1px solid #ffc107;
  color: #856404;
}

[data-theme="dark"] .banner.warn {
  background: #3d3500;
  color: #ffc107;
  border-color: #665500;
}

.preview {
  margin-top: 0.75rem;
  padding: 0.75rem;
  border-radius: 4px;
  font-size: 0.9rem;
}

.preview.success {
  background: #d4edda;
  color: #155724;
}

.preview.error {
  background: #f8d7da;
  color: #721c24;
}

[data-theme="dark"] .preview.success {
  background: #1a3d1a;
  color: #6ccb5f;
}

[data-theme="dark"] .preview.error {
  background: #3d1a1a;
  color: #ff6b6b;
}

.logs-table-wrap {
  overflow-x: auto;
}

.log-filters {
  margin-bottom: 1rem;
  padding: 1rem;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.log-filters-row {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 0.75rem 1rem;
}

.filter-field {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  min-width: 8rem;
}

.filter-field-grow {
  flex: 1 1 12rem;
  min-width: 10rem;
}

.filter-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.log-filters select,
.log-filters input[type="text"],
.log-filters input[type="search"],
.log-filters input[type="date"] {
  padding: 0.45rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 0.9rem;
}

.log-filter-summary {
  margin: 0.75rem 0 0;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.logs-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

.logs-table th,
.logs-table td {
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  text-align: left;
}

.logs-table th {
  background: var(--surface-alt);
  font-weight: 600;
}

.logs-table tr:nth-child(even) {
  background: var(--surface-alt);
}

.top-queries {
  list-style: none;
  padding: 0;
  margin: 0;
}

.top-queries li {
  padding: 0.35rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
}

.file-input-wrap {
  margin: 0.75rem 0;
}

.file-input-wrap input[type="file"] {
  font-size: 0.9rem;
}

.admin-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 0.75rem;
}

footer.app-footer {
  text-align: center;
  padding: 1.75rem 1.5rem 2rem;
  color: var(--text-muted);
  font-size: 0.8rem;
  border-top: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
  background: color-mix(in srgb, var(--surface) 70%, transparent);
}

@media (max-width: 600px) {
  .app-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .search-box {
    flex-direction: column;
  }

  .case-details-grid {
    grid-template-columns: 1fr;
  }

  .step-pills {
    flex-direction: column;
  }

  .guide-actions {
    flex-direction: column;
  }
}

/* Login page */
.login-page {
  min-height: 100vh;
}

.login-page .login-header {
  margin-bottom: 0;
}

.login-container {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 2.5rem 1.5rem 3rem;
  min-height: calc(100vh - 110px);
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2rem 2.1rem;
  width: 100%;
  max-width: 460px;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), #8764b8);
}

.case-setup-card {
  max-width: 480px;
}

.login-card h2 {
  margin: 0.35rem 0 0.5rem;
  font-size: 1.4rem;
  letter-spacing: -0.01em;
}

.login-hint {
  margin: 0 0 1.35rem;
  font-size: 0.92rem;
  color: var(--text-muted);
}

.login-card label {
  display: block;
  margin-bottom: 0.35rem;
  font-weight: 600;
  font-size: 0.88rem;
}

.login-card input[type="text"],
.case-setup-card select {
  width: 100%;
  padding: 0.8rem 0.9rem;
  margin-bottom: 1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
}

.login-card input[type="text"]:focus,
.case-setup-card select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: var(--focus-ring);
}

.checkbox-label {
  display: flex !important;
  align-items: center;
  gap: 0.5rem;
  font-weight: normal !important;
  margin-bottom: 1rem;
  cursor: pointer;
}

.login-error {
  color: var(--danger);
  font-size: 0.85rem;
  margin: 0 0 0.75rem;
}

.btn-block {
  width: 100%;
}

.login-footer-link {
  text-align: center;
  margin: 1.25rem 0 0;
  font-size: 0.85rem;
}

.btn-start-over {
  padding: 0.4rem 0.85rem;
  border: 1px solid rgba(255, 255, 255, 0.45);
  background: #d13438;
  color: #fff;
  border-radius: 999px;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  transition: background 0.15s, transform 0.12s;
}

.btn-start-over:hover {
  background: #a4262c;
  transform: translateY(-1px);
}

/* Case details */
.case-details-section h2 {
  margin: 0 0 1rem;
  font-size: 1.1rem;
}

.case-details-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
}

.form-field label {
  display: block;
  margin-bottom: 0.35rem;
  font-size: 0.85rem;
  font-weight: 600;
}

.form-field input,
.form-field select {
  width: 100%;
  padding: 0.6rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.9rem;
  background: var(--surface);
  color: var(--text);
}

.step-count {
  font-size: 0.65rem;
  padding: 0.1rem 0.4rem;
  border-radius: 10px;
  background: var(--surface-alt);
  color: var(--text-muted);
  font-weight: 600;
}

.step-count-inline {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.issue-card h3 {
  color: var(--primary);
}

/* Guide page - step pills */
.guide-container {
  max-width: 900px;
}

.step-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
}

.step-pill {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.45rem 0.8rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 0.8rem;
  color: var(--text-muted);
  box-shadow: var(--shadow-sm);
}

.step-pill.completed {
  background: color-mix(in srgb, var(--accent) 14%, var(--surface));
  border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
  color: color-mix(in srgb, var(--accent) 70%, var(--text));
}

.step-pill.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 12px color-mix(in srgb, var(--primary) 28%, transparent);
}

.step-pill.pending {
  opacity: 0.75;
}

[data-theme="dark"] .step-pill.completed {
  background: #1a3d1a;
  color: #6ccb5f;
}

.pill-number {
  font-weight: 700;
}

.pill-label {
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Instruction box */
.instruction-box {
  background: var(--instruction-bg);
  border: 1px solid var(--instruction-border);
  border-radius: var(--radius);
  padding: 1.35rem 1.5rem;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow-sm);
  position: relative;
}

.instruction-box::before {
  content: "Current step";
  display: inline-block;
  margin-bottom: 0.65rem;
  padding: 0.15rem 0.55rem;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--primary);
  background: color-mix(in srgb, var(--primary) 12%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--primary) 25%, var(--border));
}

[data-theme="high-contrast"] .instruction-box::before {
  background: #000;
  color: #ffff00;
  border-color: #ffff00;
}

.instruction-box p {
  margin: 0;
  font-size: 1.08rem;
  line-height: 1.65;
}

/* Guide actions */
.guide-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  align-items: center;
}

.guide-nav-btn {
  min-width: 120px;
}

.guide-nav-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Session notes */
.session-notes-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.3rem 1.35rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}

.session-notes-panel h2 {
  margin: 0 0 1rem;
  font-size: 1.1rem;
}

.session-notes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.5rem 1rem;
  font-size: 0.9rem;
  margin-bottom: 1rem;
}

.session-notes-grid strong {
  color: var(--text-muted);
}

.steps-taken-section {
  border-top: 1px solid var(--border);
  padding-top: 0.75rem;
  font-size: 0.9rem;
}

.steps-taken-section ol {
  margin: 0.5rem 0 0;
  padding-left: 1.25rem;
}

.steps-taken-section li.muted {
  color: var(--text-muted);
  list-style: none;
  margin-left: -1.25rem;
}

.resolution-resolved {
  color: var(--accent);
  font-weight: 600;
}

.resolution-escalated {
  color: var(--danger);
  font-weight: 600;
}

.resolution-in-progress {
  color: var(--primary);
  font-weight: 600;
}

/* Copy notes row */
.copy-notes-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.85rem;
  margin-top: 0.35rem;
  margin-bottom: 2rem;
}

.logging-status {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.agent-comments-section {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

.agent-comments-section label {
  display: block;
  margin-bottom: 0.25rem;
}

.agent-comments-hint {
  margin: 0 0 0.5rem;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.agent-comments-section textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.9rem;
  font-family: inherit;
  line-height: 1.5;
  resize: vertical;
  min-height: 90px;
  background: var(--surface);
  color: var(--text);
}

.agent-comments-section textarea:focus {
  outline: none;
  border-color: var(--primary);
}

/* Rich step visuals */
.step-figure {
  margin: 1rem 0 0;
  padding: 0.75rem;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface);
}

.step-image {
  display: block;
  width: 100%;
  max-width: 640px;
  height: auto;
  margin: 0 auto;
  border-radius: 6px;
}

.step-image-caption {
  padding: 0.5rem 0.75rem;
  font-size: 0.8rem;
  color: var(--text-muted);
  text-align: center;
  border-top: 1px solid var(--border);
}

.step-tip {
  margin-top: 0.9rem;
  padding: 0.75rem 0.9rem;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  border-left: 3px solid var(--accent);
  background: color-mix(in srgb, var(--accent) 8%, var(--surface));
  border-top: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
  border-right: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
  border-bottom: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
  color: var(--text);
}

[data-theme="dark"] .step-tip {
  background: color-mix(in srgb, var(--accent) 12%, var(--surface));
  color: var(--text);
}

.step-platform-note {
  margin: 0.5rem 0 0;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-style: italic;
}

.guide-doc-link {
  margin: -0.75rem 0 1.25rem;
  font-size: 0.85rem;
}

.guide-doc-link a {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.35rem 0.7rem;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  text-decoration: none;
  font-size: 0.86rem;
  font-weight: 600;
}

/* display:inline-flex above must not override the HTML hidden attribute */
.guide-doc-link a[hidden],
[hidden] {
  display: none !important;
}

.guide-doc-link a:hover {
  border-color: var(--primary);
}

.pill-visual {
  font-size: 0.7rem;
  opacity: 0.85;
}

.visual-badge {
  font-size: 0.68rem;
  padding: 0.15rem 0.45rem;
  border-radius: 10px;
  background: var(--surface-alt);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.flow-panel-priority {
  border: 2px solid var(--primary);
  box-shadow: var(--shadow-lg);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--primary) 6%, var(--surface)) 0%, var(--surface) 42%);
}

.kb-promo-panel {
  margin-bottom: 1.25rem;
  padding: 1.3rem 1.5rem;
  background: linear-gradient(135deg, rgba(0, 120, 212, 0.1) 0%, rgba(0, 90, 158, 0.04) 100%);
  border: 1px solid color-mix(in srgb, var(--primary) 28%, var(--border));
  border-left: 4px solid var(--primary);
  box-shadow: var(--shadow);
  border-radius: var(--radius);
}

.kb-promo-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.kb-promo-text {
  display: flex;
  align-items: center;
  gap: 0.85rem;
}

.kb-promo-text h2 {
  margin: 0;
  font-size: 1.15rem;
}

.kb-promo-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 2.75rem;
  height: 2.75rem;
  border-radius: 10px;
  background: var(--primary);
  color: #fff;
  flex-shrink: 0;
}

.kb-promo-btn {
  white-space: nowrap;
  box-shadow: 0 4px 14px color-mix(in srgb, var(--primary) 30%, transparent);
}

.kb-promo-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid color-mix(in srgb, var(--primary) 15%, var(--border));
}

.symptom-chip {
  display: inline-block;
  padding: 0.4rem 0.85rem;
  border-radius: 999px;
  font-size: 0.82rem;
  font-weight: 500;
  text-decoration: none;
  color: var(--primary);
  background: var(--surface);
  border: 1.5px solid color-mix(in srgb, var(--primary) 35%, var(--border));
  transition: background 0.15s, color 0.15s, transform 0.15s;
}

.symptom-chip:hover {
  background: var(--primary);
  color: #fff;
  transform: translateY(-1px);
}

[data-theme="dark"] .kb-promo-panel {
  background: linear-gradient(135deg, rgba(77, 163, 255, 0.12) 0%, rgba(0, 90, 158, 0.08) 100%);
}

@media (max-width: 600px) {
  .kb-promo-inner {
    flex-direction: column;
    align-items: stretch;
  }

  .kb-promo-btn {
    width: 100%;
    text-align: center;
  }
}

/* Page heroes */
.page-hero {
  margin-bottom: 1.25rem;
  padding: 1.4rem 1.55rem;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.page-hero::after {
  content: "";
  position: absolute;
  width: 180px;
  height: 180px;
  right: -40px;
  top: -60px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--primary) 12%, transparent);
  pointer-events: none;
}

.page-hero-kb {
  background: linear-gradient(135deg, color-mix(in srgb, var(--primary) 10%, var(--surface)) 0%, var(--surface) 100%);
  border-left: 4px solid var(--primary);
}

.page-hero-ts {
  background: linear-gradient(135deg, color-mix(in srgb, #8764b8 12%, var(--surface)) 0%, var(--surface) 100%);
  border-left: 4px solid #8764b8;
}

.page-hero-ts::after {
  background: color-mix(in srgb, #8764b8 14%, transparent);
}

.page-hero-title {
  margin: 0;
  font-size: 1.4rem;
  font-weight: 650;
  letter-spacing: -0.01em;
  position: relative;
  z-index: 1;
}

.page-hero-desc {
  margin: 0.4rem 0 0;
  font-size: 0.94rem;
  color: var(--text-muted);
  max-width: 42rem;
  position: relative;
  z-index: 1;
}

/* Troubleshooting promo panel */
.ts-promo-panel {
  margin-bottom: 1.25rem;
  padding: 1.3rem 1.5rem;
  background: linear-gradient(135deg, rgba(135, 100, 184, 0.12) 0%, rgba(79, 107, 237, 0.05) 100%);
  border: 1px solid color-mix(in srgb, #8764b8 28%, var(--border));
  border-left: 4px solid #8764b8;
  box-shadow: var(--shadow);
  border-radius: var(--radius);
}

.ts-promo-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.ts-promo-text {
  display: flex;
  align-items: center;
  gap: 0.85rem;
}

.ts-promo-text h2 {
  margin: 0;
  font-size: 1.15rem;
}

.ts-promo-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 2.75rem;
  height: 2.75rem;
  border-radius: 10px;
  background: #8764b8;
  color: #fff;
  flex-shrink: 0;
}

.ts-promo-btn {
  white-space: nowrap;
}

.ts-promo-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid color-mix(in srgb, #8764b8 15%, var(--border));
}

.ts-promo-chips .symptom-chip {
  color: #8764b8;
  border-color: color-mix(in srgb, #8764b8 35%, var(--border));
  cursor: pointer;
  font-family: inherit;
}

.ts-promo-chips .symptom-chip:hover {
  background: #8764b8;
  color: #fff;
}

.ts-flow-section {
  margin-bottom: 1.25rem;
}

.flow-tile-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.65rem;
}

.flow-tile {
  min-height: 3.35rem;
  padding: 0.85rem 1rem;
  border-radius: var(--radius-sm);
  font-weight: 600;
  text-align: left;
  line-height: 1.3;
  border: 1px solid color-mix(in srgb, #8764b8 25%, var(--border));
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  transition: border-color 0.15s, background 0.15s, transform 0.15s, box-shadow 0.15s;
}

.flow-tile:hover {
  border-color: #8764b8;
  background: color-mix(in srgb, #8764b8 8%, var(--surface));
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

[data-theme="dark"] .ts-promo-panel {
  background: linear-gradient(135deg, rgba(180, 160, 255, 0.12) 0%, rgba(79, 107, 237, 0.08) 100%);
}

@media (max-width: 600px) {
  .ts-promo-inner {
    flex-direction: column;
    align-items: stretch;
  }

  .ts-promo-btn {
    width: 100%;
    text-align: center;
  }

  .result-grid {
    grid-template-columns: 1fr;
  }

  .app-header {
    position: static;
  }

  .page-hero {
    padding: 1.15rem 1.2rem;
  }

  .login-card {
    padding: 1.6rem 1.35rem;
  }
}

/* Visual polish extras */
.symptom-chip {
  box-shadow: var(--shadow-sm);
}

.kb-promo-icon,
.ts-promo-icon {
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
}

.issue-card h3 {
  letter-spacing: -0.01em;
}

.result-meta {
  margin-bottom: 0.55rem;
}

.guide-actions .btn-primary {
  min-width: 140px;
}

.agent-comments-section textarea {
  border-radius: var(--radius-sm);
  border-width: 1.5px;
}

[data-theme="high-contrast"] .page-hero::after,
[data-theme="high-contrast"] .login-card::before {
  display: none;
}

[data-theme="high-contrast"] .btn-primary {
  box-shadow: none;
  color: #000;
}

.search-box .btn {
  white-space: nowrap;
  min-height: 3.25rem;
  padding: 0.85rem 1.1rem;
}

.search-section-priority {
  margin-bottom: 1.25rem;
}

.search-section-priority .search-section-lead {
  margin: 0.25rem 0 0.75rem;
  color: var(--text-muted);
  font-size: 0.95rem;
}

.search-section-priority .search-section-header h2 {
  margin-bottom: 0;
}
.search-input-wrap {
  position: relative;
  flex: 1;
  min-width: 0;
}

.search-input-wrap > input {
  width: 100%;
}

.search-suggestions {
  position: absolute;
  top: calc(100% + 0.35rem);
  left: 0;
  right: 0;
  z-index: 50;
  margin: 0;
  padding: 0.35rem 0;
  list-style: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  max-height: 18rem;
  overflow-y: auto;
}

.search-suggestion-group {
  padding: 0.45rem 0.85rem 0.25rem;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: default;
  user-select: none;
}

.search-suggestion-item {
  display: grid;
  grid-template-columns: auto 1fr;
  grid-template-rows: auto auto;
  gap: 0.15rem 0.65rem;
  align-items: center;
  padding: 0.65rem 0.85rem;
  cursor: pointer;
}

.search-suggestion-item:hover,
.search-suggestion-item.active {
  background: var(--surface-muted);
}

.suggestion-badge {
  grid-row: 1 / span 2;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 0.2rem 0.45rem;
  border-radius: 999px;
  white-space: nowrap;
}

.suggestion-badge-guide {
  background: rgba(0, 120, 212, 0.12);
  color: var(--primary);
}

.suggestion-badge-kb {
  background: rgba(16, 124, 16, 0.12);
  color: #107c10;
}

.suggestion-badge-flow {
  background: rgba(135, 100, 184, 0.14);
  color: #8764b8;
}

.suggestion-title {
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
}

.suggestion-subtitle {
  grid-column: 2;
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.3;
}

.type-badge {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 0.15rem 0.4rem;
  border-radius: 999px;
}

.type-badge-guide {

}

.type-badge-kb {

.kb-fallback-panel {

}

}

#flowQuestion {

  line-height: 1.55;
  margin: 0 0 1rem;
  color: var(--text);
}



#spa-mount { min-height: 60vh; }

<template id="tpl-case"><header class="app-header login-header">

    </div>

  <main class="container">
    <section class="panel">
      <h2>Upload Knowledge Base</h2>
      <p>
        Single entry: upload a KB file, then <strong>Apply &amp; download single-file app</strong>.
        That downloads an updated <code>outlook-assistant.html</code> with your KB baked in — redistribute that file.
      </p>
      <p>
        <strong>Excel (recommended):</strong> upload <code>Email and Outlook articles.xlsx</code>
        with columns <strong>Number</strong> and <strong>Short description</strong>.
        Or run <code>node scripts/sync-kb-from-excel.js</code> after editing the file in the repo.
        Rich guides: upload <strong>JSON</strong> (full steps, tips, URLs).
      </p>
      <div class="file-input-wrap">
        <input type="file" id="kbFileInput" accept=".json,.csv,.xlsx,.xls">
      </div>
      <div id="uploadPreview" class="preview"></div>
      <div class="admin-actions">
        <button type="button" id="uploadKbBtn" class="btn btn-primary" disabled>Apply &amp; download single-file app</button>

        <button type="button" id="downloadSampleBtn" class="btn btn-secondary">Download Sample JSON</button>
      </div>
      <p style="margin-top:1rem;font-size:0.85rem;color:var(--text-muted)">
        Excel/CSV updates the article list; existing step-by-step guides are kept when KB IDs match.
        JSON supports full steps, tips, and URLs. Download KB JSON to commit into <code>data/</code> or rebuild from source.
      </p>
    </section>

      <h2>Usage Statistics</h2>

        <div class="stat-card">
          <div class="value" id="statSearches">0</div>
          <div class="label">Searches</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statViews">0</div>
          <div class="label">Articles Viewed</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statEscalations">0</div>
          <div class="label">Escalations</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statUsers">0</div>
          <div class="label">Unique Cases</div>
        </div>
      </div>
      <h3>Top Searches</h3>
      <ul id="topQueries" class="top-queries"></ul>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Activity Logs</h2>
        <div class="admin-actions">
          <button type="button" id="refreshLogsBtn" class="btn btn-secondary">Refresh</button>
          <button type="button" id="exportLogsBtn" class="btn btn-primary">Export CSV</button>
          <button type="button" id="clearLocalLogsBtn" class="btn btn-secondary">Clear Local Logs</button>
        </div>
      </div>
      <div class="log-filters" id="logFilters">
        <div class="log-filters-row">
          <label class="filter-field">
            <span class="filter-label">Action</span>

/**
 * SPA runtime for single-file Outlook Assistant build.
 */
const SPA = {
  _query: new URLSearchParams(),

  routes: {},

  routeFromPage(url) {
    if (!url) return "login";
    return String(url).replace(/\.html.*$/, "").replace(/^\//, "");
  },

  register(route, config) {
    this.routes[route] = config;
  },

  getQuery() {
    return this._query;
  },

  navigate(route, params) {
    if (typeof route === "string" && route.includes(".html")) {
      return this.navigateFromHref(route);
    }
    let qs = "";
    if (params instanceof URLSearchParams) {
      qs = params.toString();
    } else if (params && typeof params === "object") {
      qs = new URLSearchParams(params).toString();
    }
    location.hash = "#" + route + (qs ? "?" + qs : "");
  },

  navigateFromHref(href) {
    const clean = String(href).replace(/^\.\//, "");
    const [file, qs] = clean.split("?");
    const route = file.replace(/\.html$/i, "");
    location.hash = "#" + route + (qs ? "?" + qs : "");
  },

  parseHash() {
    let h = (location.hash || "").slice(1) || "case";
    if (h.startsWith("/")) h = h.slice(1);
    const [route, qs] = h.split("?");
    this._query = new URLSearchParams(qs || "");
    return route || "login";
  },

  installLinkInterceptor() {
    document.addEventListener(
      "click",
      (e) => {
        const a = e.target.closest("a[href]");
        if (!a) return;
        const href = a.getAttribute("href") || "";
        // Bare "#" clears the SPA hash and drops users onto case setup.
        if (href === "#" || href === "") {
          e.preventDefault();
          return;
        }
        if (a.target === "_blank" || /^https?:\/\//i.test(href) || href.startsWith("mailto:")) {
          return;
        }
        if (/\.html(\?|$)/i.test(href)) {
          e.preventDefault();
          this.navigateFromHref(href);
        }
      },
      true
    );
  },

  getTemplateHtml(tplEl) {
    if (!tplEl) return "";
    if (tplEl.tagName === "TEMPLATE") {
      return tplEl.innerHTML;
    }
    return tplEl.textContent || tplEl.innerHTML || "";
  },

  async render() {
    const route = this.parseHash();
    const cfg = this.routes[route];
    if (!cfg) {
      location.hash = "#case";
      return;
    }

    document.title = (cfg.title || "Outlook Assistant") + " - Outlook Troubleshooting Assistant";
    document.body.className = cfg.bodyClass || "";

    const tpl = document.getElementById(cfg.tpl);
    const mount = document.getElementById("spa-mount");
    if (!tpl || !mount) {
      console.error("SPA: missing template or mount for route", route);
      return;
    }

    mount.innerHTML = this.getTemplateHtml(tpl);

    if (typeof cfg.init === "function") {
      await cfg.init();
    }
  },

  start() {
    this.installLinkInterceptor();
    window.addEventListener("hashchange", () => this.render());
    if (!location.hash || location.hash === "#") {
      location.hash = "#case";
    }
    this.render();
  }
};

if (typeof window !== "undefined") {
  window.SPA = SPA;
}


/**
 * Browser storage helpers for KB cache and session state.
 */
const Storage = {
  KB_CACHE_KEY: "outlookAssistant_kbCache",
  TS_GUIDE_CACHE_KEY: "outlookAssistant_tsGuideCache",
  THEME_KEY: "outlookAssistant_theme",
  EMPLOYEE_ID_KEY: "outlookAssistant_employeeId",
  EMPLOYEE_SESSION_KEY: "outlookAssistant_employeeIdSession",
  CASE_DETAILS_KEY: "outlookAssistant_caseDetails",
  GUIDE_SESSION_KEY: "outlookAssistant_guideSession",
  SESSION_KEY: "outlookAssistant_sessionId",

  getSessionId() {
    let id = sessionStorage.getItem(this.SESSION_KEY);
    if (!id) {
      id = "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2, 9);
      sessionStorage.setItem(this.SESSION_KEY, id);
    }
    return id;
  },

  getTheme() {
    return localStorage.getItem(this.THEME_KEY) || "light";
  },

  setTheme(theme) {
    localStorage.setItem(this.THEME_KEY, theme);
  },

  getEmployeeId() {
    return (
      sessionStorage.getItem(this.EMPLOYEE_SESSION_KEY) ||
      localStorage.getItem(this.EMPLOYEE_ID_KEY) ||
      ""
    );
  },

  setEmployeeId(id, remember = false) {
    if (!id) return;
    sessionStorage.setItem(this.EMPLOYEE_SESSION_KEY, id);
    if (remember) {
      localStorage.setItem(this.EMPLOYEE_ID_KEY, id);
    }
  },

  clearEmployeeId() {
    sessionStorage.removeItem(this.EMPLOYEE_SESSION_KEY);
    localStorage.removeItem(this.EMPLOYEE_ID_KEY);
  },

  getRememberedEmployeeId() {
    return localStorage.getItem(this.EMPLOYEE_ID_KEY) || "";
  },

  getCaseDetails() {
    try {
      const raw = sessionStorage.getItem(this.CASE_DETAILS_KEY);
      return raw
        ? JSON.parse(raw)
        : { chatIms: "", platform: "Windows", environment: "Exchange Online", caseSetupComplete: false };
    } catch {
      return { chatIms: "", platform: "Windows", environment: "Exchange Online", caseSetupComplete: false };
    }
  },

  setCaseDetails(details) {
    sessionStorage.setItem(this.CASE_DETAILS_KEY, JSON.stringify(details));
  },

  isCaseSetupComplete() {
    const details = this.getCaseDetails();
    return !!(details.caseSetupComplete && details.chatIms);
  },

  getGuideSession() {
    try {
      const raw = sessionStorage.getItem(this.GUIDE_SESSION_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch {
      return null;
    }
  },

  setGuideSession(session) {
    sessionStorage.setItem(this.GUIDE_SESSION_KEY, JSON.stringify(session));
  },

  clearGuideSession() {
    sessionStorage.removeItem(this.GUIDE_SESSION_KEY);
  },

  clearSession() {
    sessionStorage.removeItem(this.EMPLOYEE_SESSION_KEY);
    sessionStorage.removeItem(this.CASE_DETAILS_KEY);
    sessionStorage.removeItem(this.GUIDE_SESSION_KEY);
    sessionStorage.removeItem(this.SESSION_KEY);
  },

  getKbCache() {
    try {
      const raw = localStorage.getItem(this.KB_CACHE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const maxAge = (window.SP_CONFIG?.kbCacheHours || 24) * 3600000;
      if (Date.now() - parsed.cachedAt > maxAge) return null;
      return parsed.data;
    } catch {
      return null;
    }
  },

  setKbCache(data) {
    localStorage.setItem(
      this.KB_CACHE_KEY,
      JSON.stringify({ cachedAt: Date.now(), data })
    );
  },

  clearKbCache() {
    localStorage.removeItem(this.KB_CACHE_KEY);
  },

  getTsGuideCache() {
    try {
      const raw = localStorage.getItem(this.TS_GUIDE_CACHE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const maxAge = (window.SP_CONFIG?.kbCacheHours || 24) * 3600000;
      if (Date.now() - parsed.cachedAt > maxAge) return null;
      return parsed.data;
    } catch {
      return null;
    }
  },

  setTsGuideCache(data) {
    localStorage.setItem(
      this.TS_GUIDE_CACHE_KEY,
      JSON.stringify({ cachedAt: Date.now(), data })
    );
  },

  clearTsGuideCache() {
    localStorage.removeItem(this.TS_GUIDE_CACHE_KEY);
  }
};

/**
 * SharePoint REST API integration (no custom backend).
 */
const SharePoint = {
  getSiteUrl() {
    const cfg = window.SP_CONFIG || {};
    if (cfg.siteUrl) return cfg.siteUrl.replace(/\/$/, "");
    if (cfg.useSharePoint && window.location.href.includes(".sharepoint.com")) {
      const parts = window.location.pathname.split("/");
      const sitesIdx = parts.indexOf("sites");
      if (sitesIdx >= 0 && parts[sitesIdx + 1]) {
        return window.location.origin + "/sites/" + parts[sitesIdx + 1];
      }
      return window.location.origin;
    }
    return "";
  },

  async request(endpoint, options = {}) {
    const siteUrl = this.getSiteUrl();
    const url = endpoint.startsWith("http") ? endpoint : siteUrl + endpoint;
    const headers = {
      Accept: "application/json;odata=verbose",
      ...(options.headers || {})
    };
    const res = await fetch(url, {
      credentials: "include",
      ...options,
      headers
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error("SharePoint request failed: " + res.status + " " + text.slice(0, 200));
    }
    if (options.raw) return res;
    const ct = res.headers.get("content-type") || "";
    if (ct.includes("json")) return res.json();
    return res.text();
  },

  async getFormDigest() {
    const data = await this.request("/_api/contextinfo", { method: "POST" });
    return data.d.GetContextWebInformation.FormDigestValue;
  },

  async getCurrentUser() {
    const data = await this.request("/_api/web/currentuser");
    return data.d;
  },

  async isUserInGroup(groupName) {
    try {
      const enc = encodeURIComponent(groupName);
      await this.request("/_api/web/sitegroups/getbyname('" + enc + "')/users");
      const users = await this.request("/_api/web/sitegroups/getbyname('" + enc + "')/users");
      const current = await this.getCurrentUser();
      const list = users.d.results || [];
      return list.some((u) => u.Id === current.Id);
    } catch {
      return false;
    }
  },

  async loadKbFromSharePoint() {
    const cfg = window.SP_CONFIG;
    const escapedPath = cfg.kbFilePath.replace(/'/g, "''");
    const text = await this.request(
      "/_api/web/GetFileByServerRelativeUrl('" + escapedPath + "')/$value"
    );
    return JSON.parse(text);
  },

  async uploadKbFile(fileName, jsonContent) {
    const cfg = window.SP_CONFIG;
    const digest = await this.getFormDigest();
    const folder = cfg.kbUploadFolder.replace(/'/g, "''");
    const safeName = fileName.replace(/'/g, "''");
    const url =
      this.getSiteUrl() +
      "/_api/web/GetFolderByServerRelativeUrl('" +
      folder +
      "')/Files/add(url='" +
      safeName +
      "',overwrite=true)";

    const res = await fetch(url, {
      method: "POST",
      credentials: "include",
      headers: {
        Accept: "application/json;odata=verbose",
        "X-RequestDigest": digest,
        "Content-Type": "application/json;odata=verbose"
      },
      body: jsonContent
    });
    if (!res.ok) throw new Error("KB upload failed: " + res.status);
    return res.json();
  },

  async ensureLogList() {
    const cfg = window.SP_CONFIG;
    try {
      await this.request("/_api/web/lists/getbytitle('" + cfg.logListTitle + "')");
      return true;
    } catch {
      return false;
    }
  },

  async writeLog(entry) {
    const cfg = window.SP_CONFIG;
    if (!cfg.useSharePoint) {
      this.writeLocalLog(entry);
      return;
    }
    try {
      const digest = await this.getFormDigest();
      const body = {
        __metadata: { type: "SP.Data." + cfg.logListTitle.replace(/\s/g, "_x0020_") + "ListItem" },
        Title: entry.employeeId || entry.chatIms || "unknown",
        EmployeeId: entry.employeeId || "",
        ChatIms: entry.chatIms || "",
        Platform: entry.platform || "",
        Environment: entry.environment || "",
        UserEmail: entry.userEmail || "",
        SessionId: entry.sessionId || "",
        Action: entry.action || "",
        Query: entry.query || "",
        KbId: entry.kbId || "",
        KbTitle: entry.kbTitle || "",
        FlowId: entry.flowId || "",
        Details: entry.details || "",
        Feedback: entry.feedback || ""
      };
      await fetch(
        this.getSiteUrl() + "/_api/web/lists/getbytitle('" + cfg.logListTitle + "')/items",
        {
          method: "POST",
          credentials: "include",
          headers: {
            Accept: "application/json;odata=verbose",
            "Content-Type": "application/json;odata=verbose",
            "X-RequestDigest": digest
          },
          body: JSON.stringify(body)
        }
      );
    } catch (err) {
      console.warn("SharePoint log write failed, using local fallback:", err);
      this.writeLocalLog(entry);
    }
  },

  writeLocalLog(entry) {
    const key = "outlookAssistant_logs";
    const logs = JSON.parse(localStorage.getItem(key) || "[]");
    logs.push({ ...entry, timestamp: new Date().toISOString() });
    if (logs.length > 5000) logs.splice(0, logs.length - 5000);
    localStorage.setItem(key, JSON.stringify(logs));
  },

  getLocalLogs() {
    return JSON.parse(localStorage.getItem("outlookAssistant_logs") || "[]");
  },

  async getLogsFromSharePoint(top = 500) {
    const cfg = window.SP_CONFIG;
    const data = await this.request(
      "/_api/web/lists/getbytitle('" +
        cfg.logListTitle +
        "')/items?$orderby=Created desc&$top=" +
        top
    );
    return (data.d.results || []).map((item) => ({
      timestamp: item.Created,
      employeeId: item.EmployeeId || "",
      chatIms: item.ChatIms || "",
      platform: item.Platform || "",
      environment: item.Environment || "",
      userEmail: item.UserEmail,
      sessionId: item.SessionId,
      action: item.Action,
      query: item.Query,
      kbId: item.KbId,
      kbTitle: item.KbTitle,
      flowId: item.FlowId,
      details: item.Details,
      feedback: item.Feedback
    }));
  },

  resolveEmployeeId(user) {
    const cfg = window.SP_CONFIG;
    if (!user) return Storage.getEmployeeId();
    switch (cfg.employeeIdSource) {
      case "email":
        return user.Email || user.LoginName || "";
      case "title":
        return user.Title || "";
      case "loginName":
      default: {
        const login = user.LoginName || "";
        const match = login.match(/\\([^|]+)/) || login.match(/\|(.+)$/);
        return match ? match[1] : login.split("@")[0] || login;
      }
    }
  }
};

/**
 * Shared session state for login, case details, and guide walkthrough.
 */
const Session = {
  getEmployeeId() {
    return Storage.getEmployeeId();
  },

  isLoggedIn() {
    const id = this.getEmployeeId();
    return !!id && /^[a-zA-Z0-9._-]+$/.test(id);
  },

  requireAuth(redirectUrl = "login") {
    if (!this.isLoggedIn()) {
      SPA.navigate(SPA.routeFromPage(redirectUrl));
      return false;
    }
    return true;
  },

  getLogIdentity() {
    const caseDetails = this.getCaseDetails();
    if (caseDetails.chatIms) return caseDetails.chatIms;
    return this.getEmployeeId() || "agent";
  },

  getAgentId() {
    return this.getEmployeeId() || "agent";
  },

  ensureAnonymousSession() {
    if (!this.getEmployeeId()) {
      Storage.setEmployeeId("agent", false);
    }
    return this.getEmployeeId();
  },

  requireCaseSetup(redirectUrl = "case") {
    if (!Storage.isCaseSetupComplete()) {
      SPA.navigate(SPA.routeFromPage(redirectUrl));
      return false;
    }
    return true;
  },

  login(employeeId, remember = false) {
    Storage.setEmployeeId(employeeId.trim(), remember);
  },

  logout() {
    Storage.clearSession();
    Storage.clearGuideSession();
    const details = Storage.getCaseDetails();
    Storage.setCaseDetails({
      chatIms: "",
      platform: details.platform || "Windows",
      environment: details.environment || "Exchange Online",
      caseSetupComplete: false
    });
  },

  getCaseDetails() {
    return Storage.getCaseDetails();
  },

  saveCaseDetails(chatIms, platform, environment) {
    const details = {
      chatIms: (chatIms || "").trim(),
      platform: platform || "Windows",
      environment: environment || "Exchange Online",
      caseSetupComplete: !!(chatIms || "").trim()
    };
    Storage.setCaseDetails(details);

    const guide = this.getGuideSession();
    if (guide) {
      this.updateGuideSession({
        chatIms: details.chatIms,
        platform: details.platform,
        environment: details.environment
      });
    }
  },

  startGuide(kbId, kbTitle, stepCount, guideType = "kb") {
    const caseDetails = this.getCaseDetails();
    const session = {
      employeeId: this.getAgentId(),
      chatIms: caseDetails.chatIms,
      platform: caseDetails.platform,
      environment: caseDetails.environment,
      guideType,
      kbId,
      kbTitle,
      stepCount,
      startedAt: new Date().toISOString(),
      currentStepIndex: 0,
      resolution: "In Progress",
      caseEscalated: false,
      agentComments: "",
      stepsTaken: []
    };
    Storage.setGuideSession(session);
    return session;
  },

  getGuideSession() {
    return Storage.getGuideSession();
  },

  updateGuideSession(updates) {
    const session = this.getGuideSession();
    if (!session) return null;
    const updated = { ...session, ...updates };
    Storage.setGuideSession(updated);
    return updated;
  },

  recordStepTaken(stepIndex, stepText) {
    const session = this.getGuideSession();
    if (!session) return null;

    const existing = session.stepsTaken.filter((s) => s.step !== stepIndex + 1);
    existing.push({
      step: stepIndex + 1,
      text: stepText,
      completedAt: new Date().toISOString()
    });
    existing.sort((a, b) => a.step - b.step);

    return this.updateGuideSession({
      currentStepIndex: stepIndex,
      stepsTaken: existing
    });
  },

  setResolution(resolution) {
    return this.updateGuideSession({ resolution });
  },

  setEscalated() {
    return this.updateGuideSession({
      resolution: "Escalated",
      caseEscalated: true
    });
  },

  formatNotesDateTime(date = new Date()) {
    const pad = (n) => String(n).padStart(2, "0");
    const hours = date.getHours();
    const ampm = hours >= 12 ? "PM" : "AM";
    const h12 = hours % 12 || 12;
    return (
      pad(date.getMonth() + 1) + "/" +
      pad(date.getDate()) + "/" +
      date.getFullYear() + " " +
      pad(h12) + ":" +
      pad(date.getMinutes()) + " " +
      ampm
    );
  },

  noteLine(label, value) {
    return label.padEnd(16) + (value || "N/A");
  },

  formatOutcomeStatus(session) {
    const resolution = session.resolution || "In Progress";
    if (session.caseEscalated || resolution.toLowerCase() === "escalated") {
      return "ESCALATED";
    }
    if (resolution.toLowerCase() === "resolved") {
      return "RESOLVED";
    }
    return "IN PROGRESS";
  },

  buildNotesText() {
    const session = this.getGuideSession();
    if (!session) return "";

    const totalSteps = session.stepCount || session.stepsTaken.length || 0;
    const stepsCompleted = session.stepsTaken.length;
    const status = this.formatOutcomeStatus(session);

    let text = "=== OUTLOOK TROUBLESHOOTING NOTES ===\n\n";

    text += "CASE INFORMATION\n";
    text += "----------------\n";
    text += this.noteLine("Date/Time:", this.formatNotesDateTime()) + "\n";
    text += this.noteLine("Chat IMS:", session.chatIms) + "\n";
    text += this.noteLine("Platform:", session.platform) + "\n";
    text += this.noteLine("Environment:", session.environment) + "\n\n";

    text += "ISSUE\n";
    text += "-----\n";
    const idLabel = session.guideType === "troubleshooting" ? "Guide ID:" : "KB ID:";
    text += this.noteLine(idLabel, session.kbId) + "\n";
    text += this.noteLine("Summary:", session.kbTitle) + "\n\n";

    text += "TROUBLESHOOTING PERFORMED\n";
    text += "-------------------------\n";
    if (session.stepsTaken.length) {
      session.stepsTaken.forEach((s) => {
        text += s.step + ". " + s.text + "\n";
      });
    } else {
      text += "No troubleshooting steps recorded.\n";
    }
    text += "\n";

    text += "OUTCOME\n";
    text += "-------\n";
    text += this.noteLine("Status:", status) + "\n";
    text += this.noteLine("Steps Completed:", stepsCompleted + " of " + totalSteps) + "\n";

    if (session.agentComments && session.agentComments.trim()) {
      text += "\nAGENT COMMENTS\n";
      text += "--------------\n";
      text += session.agentComments.trim() + "\n";
    }

    text += "\n=== END NOTES ===";
    return text;
  },

  async copyNotes() {
    const text = this.buildNotesText();
    if (!text) return false;

    try {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch {
      /* fallback below */
    }

    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(textarea);
    return ok;
  }
};

/**
 * KB search and relevance scoring.
 */
const SearchEngine = {
  kbData: null,

  setData(data) {
    this.kbData = data;
  },

  normalize(text) {
    return (text || "")
      .toLowerCase()
      .replace(/[^\w\s]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  },

  expandQuery(query) {
    const terms = new Set(this.normalize(query).split(" ").filter(Boolean));
    const synonyms = this.kbData?.synonyms || {};
    for (const [key, values] of Object.entries(synonyms)) {
      const keyNorm = this.normalize(key);
      const all = [keyNorm, ...values.map((v) => this.normalize(v))];
      if (all.some((t) => query.toLowerCase().includes(t) || terms.has(t))) {
        all.forEach((t) => t.split(" ").forEach((w) => terms.add(w)));
      }
    }
    return [...terms];
  },

  scoreArticle(article, terms, rawQuery, platform) {
    let score = 0;
    const q = this.normalize(rawQuery);
    const title = this.normalize(article.title);
    const id = this.normalize(article.id);
    const category = this.normalize(article.category);
    const keywords = (article.keywords || []).map((k) => this.normalize(k)).join(" ");
    const symptoms = (article.symptoms || []).map((s) => this.normalize(s)).join(" ");

    if (title.includes(q)) score += 50;
    if (id.includes(q)) score += 40;
    if (symptoms.includes(q)) score += 35;

    for (const term of terms) {
      if (term.length < 2) continue;
      if (title.includes(term)) score += 12;
      if (keywords.includes(term)) score += 8;
      if (symptoms.includes(term)) score += 10;
      if (category.includes(term)) score += 5;
      if (id.includes(term)) score += 6;
    }

    score += Math.max(0, 4 - (article.priority || 3));
    if (typeof PlatformMatch !== "undefined" && platform) {
      score += PlatformMatch.platformBoost(article, platform, false);
    }
    return score;
  },

  search(query, limit = 10, options = {}) {
    if (!this.kbData?.articles?.length) return [];
    const q = (query || "").trim();
    if (!q) return [];

    const platform = options.platform;
    const terms = this.expandQuery(q);
    const results = this.kbData.articles
      .map((article) => ({
        article,
        score: this.scoreArticle(article, terms, q, platform)
      }))
      .filter((r) => r.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, limit);

    return results.map((r, i) => ({
      ...r.article,
      relevanceScore: r.score,
      matchLabel: i === 0 ? "Best match" : i < 3 ? "Related" : "Try if above fails"
    }));
  },

  getArticleById(id) {
    return (this.kbData?.articles || []).find((a) => a.id === id) || null;
  },

  getArticlesByIds(ids) {
    return (ids || []).map((id) => this.getArticleById(id)).filter(Boolean);
  },

  getCategories() {
    const cats = new Set();
    (this.kbData?.articles || []).forEach((a) => {
      if (a.category) cats.add(a.category);
    });
    return [...cats].sort();
  },

  getFlows() {
    return this.kbData?.flows || [];
  },

  getFlowById(id) {
    return this.getFlows().find((f) => f.id === id) || null;
  }
};

}


/**

const KbLoader = {
  kbData: null,

  async load(forceRefresh = false) {
    try {
      if (!forceRefresh) {
        const cached = Storage.getKbCache();
        if (cached) {
          this.kbData = cached;
          SearchEngine.setData(cached);
          return cached;
        }
      }

      const cfg = window.SP_CONFIG;
      if (cfg.useSharePoint) {
        this.kbData = await SharePoint.loadKbFromSharePoint();
      } else {
        const adminKb = localStorage.getItem("outlookAssistant_adminKb");
        if (adminKb) {
          this.kbData = JSON.parse(adminKb);
        } else if (window.EMBEDDED_KB) {
          this.kbData = window.EMBEDDED_KB;
        } else {
          const res = await fetch(cfg.localKbPath);
          if (!res.ok) throw new Error("Failed to load local KB");
          this.kbData = await res.json();
        }
      }
      Storage.setKbCache(this.kbData);
      SearchEngine.setData(this.kbData);
      return this.kbData;
    } catch (err) {
      console.error(err);
      this.kbData = { articles: [], flows: [], synonyms: {} };
      SearchEngine.setData(this.kbData);
      return this.kbData;
    }
  },

  getArticle(kbId) {
    return SearchEngine.getArticleById(kbId);
  },

  getData() {

};

    const category = this.normalize(guide.category);
    const keywords = (guide.keywords || []).map((k) => this.normalize(k)).join(" ");
    const symptoms = (guide.symptoms || []).map((s) => this.normalize(s)).join(" ");

    if (title.includes(q)) score += 50;
    if (id.includes(q)) score += 40;
    if (symptoms.includes(q)) score += 35;

    for (const term of terms) {
      if (term.length < 2) continue;
      if (title.includes(term)) score += 12;
      if (keywords.includes(term)) score += 8;
      if (symptoms.includes(term)) score += 10;
      if (category.includes(term)) score += 5;
    }
    score += Math.max(0, 4 - (guide.priority || 3));
    if (typeof PlatformMatch !== "undefined" && platform) {
      score += PlatformMatch.platformBoost(guide, platform, true);
    }
    return score;
  },

  search(query, limit = 12, options = {}) {
    const guides = this.data?.guides || [];
    const q = (query || "").trim();
    const platform = options.platform;
    if (!q) {
      return guides
        .filter((g) => !platform || PlatformMatch.guideAppliesToPlatform(g, platform))
        .map((g) => ({ ...g, matchLabel: "Available" }));
    }

    const terms = this.expandQuery(q);
    return guides
      .map((guide) => ({ guide, score: this.scoreGuide(guide, terms, q, platform) }))
      .filter((r) => r.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, limit)
      .map((r, i) => ({
        ...r.guide,
        relevanceScore: r.score,
        matchLabel: i === 0 ? "Best match" : i < 3 ? "Related" : "Try if above fails"
      }));
  },

  getGuideById(id) {
    return (this.data?.guides || []).find((g) => g.id === id) || null;
  },

  getGuidesByIds(ids) {
    return (ids || []).map((id) => this.getGuideById(id)).filter(Boolean);
  },

  getCategories() {
    const cats = new Set();
    (this.data?.guides || []).forEach((g) => {
      if (g.category) cats.add(g.category);
    });
    return [...cats].sort();
  },

  getFlows() {
    return this.data?.flows || [];
  }
};

  window.TroubleshootingSearch = TroubleshootingSearch;
