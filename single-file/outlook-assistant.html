/**
 * Rich KB step parsing (string or object). Backward compatible with v1 KB.
 */
const StepUtils = {
  getText(step) {
    if (typeof step === "string") return step;
    if (step && typeof step.text === "string") return step.text;
    return "";
  },

  getImage(step, imageBasePath) {
    if (!step || typeof step === "string") return null;
    const img = step.image || "";
    if (!img) return null;
    if (window.EMBEDDED_IMAGES && window.EMBEDDED_IMAGES[img]) return window.EMBEDDED_IMAGES[img];
    if (img.startsWith("http") || img.startsWith("data:") || img.startsWith("/")) return img;
    const base = (imageBasePath || "").replace(/\/?$/, "/");
    return img.includes("/") ? img : base + img;
  },

  getAlt(step) {
    if (!step || typeof step === "string") return "";
    return step.alt || "";
  },

  getTip(step) {
    if (!step || typeof step === "string") return "";
    return step.tip || "";
  },

  getPlatforms(step) {
    if (!step || typeof step === "string") return null;
    return Array.isArray(step.platforms) && step.platforms.length ? step.platforms : null;
  },

  appliesToPlatform(step, platform) {
    const platforms = this.getPlatforms(step);
    if (!platforms) return true;
    return platforms.some((p) => p.toLowerCase() === (platform || "").toLowerCase());
  },

  filterSteps(steps, platform) {
    return (steps || []).filter((s) => this.appliesToPlatform(s, platform));
  },

  getLabel(step, index) {
    const text = this.getText(step);
    const short = text.length > 40 ? text.slice(0, 40) + "..." : text;
    return short || "Step " + (index + 1);
  },

  articleHasImages(article) {
    return (article.steps || []).some((s) => typeof s === "object" && s.image);
  },

  validateStep(step, articleId, index) {
    if (typeof step === "string") {
      if (!step.trim()) throw new Error(articleId + " step " + index + ": empty string step");
      return;
    }
    if (!step || typeof step !== "object") {
      throw new Error(articleId + " step " + index + ": must be string or object");
    }
    if (!step.text || typeof step.text !== "string") {
      throw new Error(articleId + " step " + index + ": object step requires text");
    }
    if (step.image != null && typeof step.image !== "string") {
      throw new Error(articleId + " step " + index + ": image must be a string path");
    }
    if (step.platforms != null && !Array.isArray(step.platforms)) {
      throw new Error(articleId + " step " + index + ": platforms must be an array");
    }
  }
};

if (typeof window !== "undefined") {
  window.StepUtils = StepUtils;
}


/**
 * Platform applicability helpers for search and routing.
 */
const PlatformMatch = {
  getSessionPlatform() {
    if (typeof Session !== "undefined" && Session.getCaseDetails) {
      return Session.getCaseDetails()?.platform || "Windows";
    }
    return "Windows";
  },

  itemHasApplicableSteps(item, platform) {
    const steps = item?.steps || [];
    if (!steps.length) return true;
    return steps.some((s) => StepUtils.appliesToPlatform(s, platform));
  },

  guideAppliesToPlatform(guide, platform) {
    return this.itemHasApplicableSteps(guide, platform);
  },

  articleAppliesToPlatform(article, platform) {
    return this.itemHasApplicableSteps(article, platform);
  },

  clientBoost(guide, platform) {
    const client = (guide?.client || "both").toLowerCase();
    const p = (platform || "").toLowerCase();
    if (p === "mobile" || p === "web") {
      if (client === "new" || client === "both") return 10;
      if (client === "classic") return -5;
    }
    return 0;
  },

  platformBoost(item, platform, isGuide) {
    if (!platform) return 0;
    if (!this.itemHasApplicableSteps(item, platform)) return -1000;
    let boost = 18;
    if (isGuide) boost += this.clientBoost(item, platform);
    return boost;
  }
};

if (typeof window !== "undefined") {
  window.PlatformMatch = PlatformMatch;
}

if (typeof module !== "undefined" && module.exports) {
  module.exports = { PlatformMatch };
}


/**
 * Routes users through troubleshooting guides first, then org KB when needed.
 */
const GuideResolver = {
  normalize(text) {
    return (text || "")
      .toLowerCase()
      .replace(/[^\w\s]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  },

  tokens(text) {
    return new Set(
      this.normalize(text)
        .split(" ")
        .filter((w) => w.length > 2)
    );
  },

  overlapScore(source, target) {
    let score = 0;
    const sourceTokens = this.tokens(
      [source.title, ...(source.keywords || []), ...(source.symptoms || [])].join(" ")
    );
    const targetTokens = this.tokens(
      [target.title, ...(target.keywords || []), ...(target.symptoms || [])].join(" ")
    );
    for (const t of sourceTokens) {
      if (targetTokens.has(t)) score += 4;
    }
    const sTitle = this.normalize(source.title);
    const tTitle = this.normalize(target.title);
    if (sTitle && tTitle && (sTitle.includes(tTitle) || tTitle.includes(sTitle))) {
      score += 20;
    }
    for (const symptom of source.symptoms || []) {
      const s = this.normalize(symptom);
      if (s && tTitle.includes(s)) score += 12;
    }
    return score;
  },

  getTsSearch() {
    return typeof TroubleshootingSearch !== "undefined" ? TroubleshootingSearch : null;
  },

  getKbSearch() {
    return typeof SearchEngine !== "undefined" ? SearchEngine : null;
  },

  findRelatedTsGuide(kbArticle) {
    if (!kbArticle) return null;
    const ts = this.getTsSearch();
    if (!ts) return null;
    if (kbArticle.relatedGuideId) {
      return ts.getGuideById(kbArticle.relatedGuideId);
    }
    const guides = ts.data?.guides || [];
    let best = null;
    let bestScore = 0;
    for (const guide of guides) {
      const score = this.overlapScore(kbArticle, guide);
      if (score > bestScore) {
        bestScore = score;
        best = guide;
      }
    }
    return bestScore >= 15 ? best : null;
  },

  findRelatedKb(tsGuide) {
    if (!tsGuide) return null;
    const kb = this.getKbSearch();
    if (!kb) return null;
    if (tsGuide.relatedKbId) {
      return kb.getArticleById(tsGuide.relatedKbId);
    }
    const articles = kb.kbData?.articles || [];
    let best = null;
    let bestScore = 0;
    for (const article of articles) {
      const score = this.overlapScore(tsGuide, article);
      if (score > bestScore) {
        bestScore = score;
        best = article;
      }
    }
    return bestScore >= 15 ? best : null;
  },

  resolveItem(item) {
    if (!item) return null;
    if (item.type === "troubleshooting" || item.guideType === "troubleshooting") {
      return { type: "troubleshooting", item, kbFallback: null };
    }
    if (item.type === "flow") {
      return { type: "flow", item: item.flow || item };
    }
    const tsGuide = this.findRelatedTsGuide(item);
    if (tsGuide) {
      return { type: "troubleshooting", item: tsGuide, kbFallback: item };
    }
    return { type: "kb", item, kbFallback: null };
  },

  async openItem(item) {
    const resolved = this.resolveItem(item);
    if (!resolved) return;

    if (resolved.type === "flow") {
      if (typeof TroubleshootingApp !== "undefined") {
        TroubleshootingApp.startFlow(resolved.item);
      }
      return;
    }

    const platform = PlatformMatch.getSessionPlatform();

    if (resolved.type === "troubleshooting") {
      const guide = resolved.item;
      const steps = StepUtils.filterSteps(guide.steps || [], platform);
      const count = steps.length || (guide.steps || []).length;
      Session.startGuide(guide.id, guide.title, count, "troubleshooting");
      if (resolved.kbFallback?.id) {
        Session.updateGuideSession({ fallbackKbId: resolved.kbFallback.id });
      }
      try {
        await Logger.logArticleView({ id: guide.id, title: guide.title });
      } catch (err) {
        console.warn("Article view logging failed:", err);
      }
      SPA.navigate("troubleshooting-guide", { guide: guide.id });
      return;
    }

    const article = resolved.item;
    const steps = StepUtils.filterSteps(article.steps || [], platform);
    const count = steps.length || (article.steps || []).length;
    const existing = Session.getGuideSession();
    const isTsKbFallback =
      existing?.guideType === "troubleshooting" &&
      existing.fallbackKbId === article.id;

    if (isTsKbFallback) {
      Session.updateGuideSession({
        guideType: "kb",
        kbId: article.id,
        kbTitle: article.title,
        stepCount: count,
        currentStepIndex: 0
      });
    } else {
      Session.startGuide(article.id, article.title, count, "kb");
    }
    try {
      await Logger.logArticleView(article);
    } catch (err) {
      console.warn("Article view logging failed:", err);
    }
    SPA.navigate("guide", { kb: article.id });
  },

  openGuideById(id) {
    const ts = this.getTsSearch();
    const guide = ts?.getGuideById(id);
    if (guide) {
      this.openItem({ ...guide, type: "troubleshooting" });
      return true;
    }
    const kb = this.getKbSearch();
    const article = kb?.getArticleById(id);
    if (article) {
      this.openItem({ ...article, type: "kb" });
      return true;
    }
    return false;
  },

  resolveFlowTargets(ids) {
    const platform = PlatformMatch.getSessionPlatform();
    const ts = this.getTsSearch();
    const kb = this.getKbSearch();
    const targets = [];
    const seen = new Set();

    for (const id of ids || []) {
      if (!id || seen.has(id)) continue;

      const guide = ts?.getGuideById(id);
      if (guide && PlatformMatch.guideAppliesToPlatform(guide, platform)) {
        seen.add(id);
        targets.push({ type: "troubleshooting", item: guide });
        continue;
      }

      const article = kb?.getArticleById(id);
      if (article && PlatformMatch.articleAppliesToPlatform(article, platform)) {
        seen.add(id);
        targets.push({ type: "kb", item: article });
      }
    }

    return targets;
  }
};

if (typeof window !== "undefined") {
  window.GuideResolver = GuideResolver;
}

if (typeof module !== "undefined" && module.exports) {
  module.exports = { GuideResolver };
}


/**
 * Unified search across troubleshooting guides (first) and org KB.
 */
const UnifiedSearch = {
  getPlatform(options) {
    return options?.platform ?? PlatformMatch.getSessionPlatform();
  },

  matchFlows(query, platform) {
    const q = (query || "").trim().toLowerCase();
    if (!q) return [];
    const flows = TroubleshootingSearch.getFlows() || [];
    return flows
      .filter((flow) => {
        const title = (flow.title || "").toLowerCase();
        const id = (flow.id || "").toLowerCase();
        return title.includes(q) || id.includes(q.replace(/\s+/g, "-"));
      })
      .map((flow) => ({
        id: flow.id,
        title: flow.title,
        type: "flow",
        flow,
        score: 45,
        matchLabel: "Guided flow",
        subtitle: "Symptom wizard"
      }));
  },

  sortByScore(items) {
    return [...items].sort((a, b) => (b.score || 0) - (a.score || 0));
  },

  /** Guides and flows first, then org KB — each group sorted by relevance. */
  mergeTiered(tsItems, kbItems, limit, kbReserve = 3) {
    const tsPool = this.sortByScore(tsItems);
    const kbPool = this.sortByScore(kbItems);
    if (!tsPool.length) {
      return kbPool.slice(0, limit);
    }
    if (!kbPool.length) {
      return tsPool.slice(0, limit);
    }

    const reservedKb = Math.min(kbReserve, kbPool.length, Math.max(1, limit - 1));
    const tsTake = Math.min(tsPool.length, limit - reservedKb);
    const kbTake = Math.min(kbPool.length, limit - tsTake);
    return [...tsPool.slice(0, tsTake), ...kbPool.slice(0, kbTake)];
  },

  suggest(query, options = {}) {
    const q = (query || "").trim();
    if (q.length < 2) return [];

    const platform = this.getPlatform(options);
    const limit = options.limit ?? 10;
    const kbOnly = options.kbOnly ?? false;
    const kbReserve = options.kbReserve ?? 3;
    const tsItems = [];
    const kbItems = [];

    if (!kbOnly) {
      tsItems.push(...this.matchFlows(q, platform));
      TroubleshootingSearch.search(q, limit * 2, { platform }).forEach((guide) => {
        tsItems.push({
          ...guide,
          type: "troubleshooting",
          score: guide.relevanceScore || 0,
          badge: "Guide"
        });
      });
    }

    SearchEngine.search(q, limit * 2, { platform }).forEach((article) => {
      kbItems.push({
        ...article,
        type: "kb",
        score: article.relevanceScore || 0,
        badge: "Org KB"
      });
    });

    return this.mergeTiered(tsItems, kbItems, limit, kbReserve);
  },

  search(query, options = {}) {
    const q = (query || "").trim();
    const platform = this.getPlatform(options);
    const limit = options.limit ?? 12;
    const kbOnly = options.kbOnly ?? false;

    if (!q) {
      if (kbOnly) {
        return (SearchEngine.kbData?.articles || []).map((a) => ({
          ...a,
          type: "kb",
          matchLabel: "Available",
          badge: "Org KB"
        }));
      }
      const guides = (TroubleshootingSearch.data?.guides || []).map((g) => ({
        ...g,
        type: "troubleshooting",
        matchLabel: "Available",
        badge: "Guide"
      }));
      const articles = (SearchEngine.kbData?.articles || []).map((a) => ({
        ...a,
        type: "kb",
        matchLabel: "Available",
        badge: "Org KB"
      }));
      return [...guides, ...articles];
    }

    const merged = this.suggest(q, { ...options, limit: limit * 2, kbOnly });
    return merged.map((item, i) => ({
      ...item,
      matchLabel:
        item.matchLabel ||
        (i === 0 ? "Best match" : i < 3 ? "Related" : "Try if above fails")
    }));
  }
};

if (typeof window !== "undefined") {
  window.UnifiedSearch = UnifiedSearch;
}

if (typeof module !== "undefined" && module.exports) {
  module.exports = { UnifiedSearch };
}


/**
 * Live search suggestion dropdown for hub pages.
 */
const SearchSuggestions = {
  mount(inputEl, options = {}) {
    if (!inputEl) return null;

    let wrap = inputEl.parentElement;
    if (!wrap?.classList.contains("search-input-wrap")) {
      wrap = document.createElement("div");
      wrap.className = "search-input-wrap search-suggest-wrap";
      inputEl.parentNode.insertBefore(wrap, inputEl);
      wrap.appendChild(inputEl);
    }

    let listEl = wrap.querySelector(".search-suggestions");
    if (!listEl) {
      listEl = document.createElement("ul");
      listEl.className = "search-suggestions";
      listEl.setAttribute("role", "listbox");
      listEl.hidden = true;
      wrap.appendChild(listEl);
    }

    const state = {
      inputEl,
      listEl,
      items: [],
      activeIndex: -1,
      debounce: null,
      getSuggestions: options.getSuggestions,
      onSelect: options.onSelect,
      onSubmit: options.onSubmit
    };

    inputEl.setAttribute("role", "combobox");
    inputEl.setAttribute("aria-autocomplete", "list");
    inputEl.setAttribute("aria-expanded", "false");

    inputEl.addEventListener("input", () => {
      clearTimeout(state.debounce);
      state.debounce = setTimeout(() => this.refresh(state), 150);
    });

    inputEl.addEventListener("keydown", (e) => this.onKeyDown(state, e));

    document.addEventListener("click", (e) => {
      if (!wrap?.contains(e.target)) this.hide(state);
    });

    return state;
  },

  async refresh(state) {
    const q = state.inputEl.value.trim();
    if (q.length < 2) {
      this.hide(state);
      return;
    }
    const items = await state.getSuggestions(q);
    state.items = items || [];
    state.activeIndex = -1;
    this.render(state);
  },

  render(state) {
    const { listEl, items, inputEl } = state;
    if (!listEl) return;

    if (!items.length) {
      this.hide(state);
      return;
    }

    listEl.innerHTML = "";
    let lastGroup = null;
    items.forEach((item, index) => {
      const group = item.type === "kb" ? "kb" : "guide";
      if (group !== lastGroup) {
        const heading = document.createElement("li");
        heading.className = "search-suggestion-group";
        heading.setAttribute("role", "presentation");
        heading.textContent = group === "kb" ? "Org knowledge base" : "Troubleshooting guides";
        listEl.appendChild(heading);
        lastGroup = group;
      }

      const li = document.createElement("li");
      li.className = "search-suggestion-item";
      li.setAttribute("role", "option");
      li.dataset.index = String(index);
      const badge = item.badge || (item.type === "flow" ? "Flow" : item.type === "kb" ? "Org KB" : "Guide");
      const subtitle = item.subtitle || (item.symptoms?.[0] || item.category || "");
      li.innerHTML =
        '<span class="suggestion-badge suggestion-badge-' +
        this.badgeClass(item.type) +
        '">' +
        HubUi.escape(badge) +
        "</span>" +
        '<span class="suggestion-title">' +
        HubUi.escape(item.title) +
        "</span>" +
        (subtitle
          ? '<span class="suggestion-subtitle">' + HubUi.escape(subtitle) + "</span>"
          : "");
      li.addEventListener("mousedown", (e) => {
        e.preventDefault();
        this.select(state, index);
      });
      listEl.appendChild(li);
    });

    listEl.hidden = false;
    inputEl.setAttribute("aria-expanded", "true");
  },

  badgeClass(type) {
    if (type === "kb") return "kb";
    if (type === "flow") return "flow";
    return "guide";
  },

  hide(state) {
    if (!state.listEl) return;
    state.listEl.hidden = true;
    state.listEl.innerHTML = "";
    state.items = [];
    state.activeIndex = -1;
    state.inputEl.setAttribute("aria-expanded", "false");
  },

  onKeyDown(state, e) {
    if (e.key === "ArrowDown") {
      if (!state.items.length) return;
      e.preventDefault();
      state.activeIndex = Math.min(state.activeIndex + 1, state.items.length - 1);
      this.highlight(state);
      return;
    }
    if (e.key === "ArrowUp") {
      if (!state.items.length) return;
      e.preventDefault();
      state.activeIndex = Math.max(state.activeIndex - 1, 0);
      this.highlight(state);
      return;
    }
    if (e.key === "Escape") {
      this.hide(state);
      return;
    }
    if (e.key === "Enter") {
      if (state.activeIndex >= 0 && state.items[state.activeIndex]) {
        e.preventDefault();
        e.stopPropagation();
        this.select(state, state.activeIndex);
        return;
      }
      if (state.onSubmit) {
        e.preventDefault();
        e.stopPropagation();
        this.hide(state);
        state.onSubmit(state.inputEl.value);
      }
    }
  },

  highlight(state) {
    const children = state.listEl?.querySelectorAll(".search-suggestion-item") || [];
    children.forEach((el, i) => {
      el.classList.toggle("active", i === state.activeIndex);
      if (i === state.activeIndex) el.scrollIntoView({ block: "nearest" });
    });
  },

  select(state, index) {
    const item = state.items[index];
    if (!item) return;
    state.inputEl.value = item.title || "";
    this.hide(state);
    if (state.onSelect) state.onSelect(item);
  }
};

if (typeof window !== "undefined") {
  window.SearchSuggestions = SearchSuggestions;
}


/**
 * Shared UI helpers for org KB and troubleshooting hub pages.
 */
const HubUi = {
  CATEGORY_ACCENTS: {
    email: "#0078d4",
    copilot: "#8764b8",
    "email-security": "#c239b3",
    "shared-mailboxes": "#008272",
    "archive-storage": "#797775",
    "mobile-owa": "#00b7c3",
    "new-outlook": "#4f6bed",
    calendar: "#107c10",
    search: "#ca5010",
    authentication: "#d13438",
    "connectivity-sync": "#0078d4",
    "send-receive": "#038387",
    "performance-stability": "#5c2d91"
  },

  CARD_DISPLAY_LIMIT: 6,

  getVisibleResults(results, options = {}) {
    const limit = options.limit ?? this.CARD_DISPLAY_LIMIT;
    if (results.length <= limit) {
      return { visible: results, limited: false, hiddenCount: 0 };
    }
    return {
      visible: results.slice(0, limit),
      limited: true,
      hiddenCount: results.length - limit
    };
  },

  categorySlug(category) {
    return (category || "other")
      .toLowerCase()
      .replace(/&/g, "and")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-|-$/g, "") || "other";
  },

  getCategoryAccent(category) {
    const slug = this.categorySlug(category);
    return this.CATEGORY_ACCENTS[slug] || "#607d8b";
  },

  applyCategory(el, category) {
    if (!el || !category) return;
    const slug = this.categorySlug(category);
    el.dataset.cat = slug;
    el.style.setProperty("--cat-accent", this.getCategoryAccent(category));
  },

  renderSessionBadges(container, details) {
    if (!container) return;
    const ims = (details?.chatIms || "").trim() || "N/A";
    const platform = details?.platform || "N/A";
    const environment = details?.environment || "N/A";
    container.className = "session-summary session-badges";
    container.innerHTML =
      '<span class="session-badge"><span class="session-badge-label">IMS</span>' +
      this.escape(ims) +
      "</span>" +
      '<span class="session-badge"><span class="session-badge-label">Platform</span>' +
      this.escape(platform) +
      "</span>" +
      '<span class="session-badge"><span class="session-badge-label">Environment</span>' +
      this.escape(environment) +
      "</span>";
  },

  updateResultCount(container, options) {
    if (!container) return;
    const displayed = options.displayed ?? options.count ?? 0;
    const total = options.total ?? displayed;
    const query = (options.query || "").trim();
    const noun = options.noun || "results";
    const singular = options.singular || noun.replace(/s$/, "");

    let text;
    if (query) {
      text =
        displayed === 1
          ? '1 ' + singular + ' for <strong>"' + this.escape(query) + '"</strong>'
          : displayed + " " + noun + ' for <strong>"' + this.escape(query) + '"</strong>';
    } else if (options.limited && total > displayed) {
      text =
        "Showing <strong>" +
        displayed +
        "</strong> of <strong>" +
        total +
        "</strong> " +
        (total === 1 ? singular : noun);
    } else if (total && displayed === total) {
      text = "Showing all <strong>" + displayed + "</strong> " + (displayed === 1 ? singular : noun);
    } else {
      text =
        "Showing <strong>" +
        displayed +
        "</strong> of <strong>" +
        total +
        "</strong> " +
        (total === 1 ? singular : noun);
    }

    container.innerHTML = text;
    container.hidden = false;
  },

  buildSymptomTagsHtml(symptoms, max, escapeFn) {
    const esc = escapeFn || ((s) => s);
    const list = (symptoms || []).filter(Boolean).slice(0, max || 3);
    if (!list.length) return "";
    return (
      '<div class="symptom-tags">' +
      list
        .map((s) => '<span class="symptom-tag">' + esc(s) + "</span>")
        .join("") +
      "</div>"
    );
  },

  escape(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  },

  renderShowAllButton(parent, options = {}) {
    if (!parent) return;
    let btn = parent.querySelector(".show-all-btn");
    if (!options.limited || !options.hiddenCount) {
      if (btn) btn.hidden = true;
      return;
    }
    if (!btn) {
      btn = document.createElement("button");
      btn.type = "button";
      btn.className = "btn btn-secondary show-all-btn";
      const grid = parent.querySelector(".result-grid");
      if (grid?.nextSibling) {
        parent.insertBefore(btn, grid.nextSibling);
      } else {
        parent.appendChild(btn);
      }
    }
    btn.hidden = false;
    btn.textContent = "Show all (" + options.hiddenCount + " more)";
    btn.onclick = options.onShowAll;
  }
};

        <button type="button" data-theme-btn="corporate">Corporate</button>
      </div>
    </div>
  `,

  mount(selector) {

    if (el) el.innerHTML = this.html;
  }
};

/**
 * Theme management - subtle picker with dropdown menu.
 */
const Themes = {
  themes: [
    { id: "light", label: "Light" },
    { id: "dark", label: "Dark" },
    { id: "high-contrast", label: "High contrast" },
    { id: "corporate", label: "Corporate" }
  ],

  _eventsBound: false,

  apply(theme) {
    const t = this.themes.some((item) => item.id === theme) ? theme : "light";
    document.documentElement.setAttribute("data-theme", t);
    Storage.setTheme(t);
    document.querySelectorAll("[data-theme-btn]").forEach((btn) => {
      btn.classList.toggle("active", btn.dataset.themeBtn === t);
    });
  },

  init() {
    this.apply(Storage.getTheme());
    this.bindPickers();
  },

  bindPickers() {
    if (this._eventsBound) return;
    this._eventsBound = true;

    document.addEventListener("click", (e) => {
      const themeBtn = e.target.closest(".theme-picker-menu [data-theme-btn]");
      if (themeBtn) {
        e.stopPropagation();
        this.apply(themeBtn.dataset.themeBtn);
        this.closeAllMenus();
        return;
      }

      const toggle = e.target.closest(".theme-picker-toggle");
      if (toggle) {
        e.stopPropagation();
        const menu = toggle.closest(".theme-picker")?.querySelector(".theme-picker-menu");
        if (!menu) return;
        const willOpen = menu.hidden;
        this.closeAllMenus();
        menu.hidden = !willOpen;
        toggle.setAttribute("aria-expanded", String(willOpen));
        return;
      }

      if (!e.target.closest(".theme-picker")) {
        this.closeAllMenus();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") this.closeAllMenus();
    });
  },

  closeAllMenus() {
    document.querySelectorAll(".theme-picker-menu").forEach((menu) => {
      menu.hidden = true;
    });
    document.querySelectorAll(".theme-picker-toggle").forEach((toggle) => {
      toggle.setAttribute("aria-expanded", "false");
    });
  }
};

if (typeof window !== "undefined") {
  window.Themes = Themes;
}


/**
 * Admin authentication for the dashboard (static client-side gate).
 *
 * Known limitation: credentials live in client config (SP_CONFIG). Real protection
 * requires SharePoint group / page permissions — not fixable in static HTML alone.
 */
const AdminAuth = {
  AUTH_KEY: "outlookAssistant_adminAuth",
  USER_KEY: "outlookAssistant_adminUser",

  isAuthenticated() {
    return sessionStorage.getItem(this.AUTH_KEY) === "true";
  },

  getUsername() {
    return sessionStorage.getItem(this.USER_KEY) || "";
  },

  login(username, password) {
    const cfg = window.SP_CONFIG || {};
    const expectedUser = cfg.adminUsername || "Hannah";
    const expectedPass = cfg.adminPassword || "Hannah@95";

    if (username === expectedUser && password === expectedPass) {
      sessionStorage.setItem(this.AUTH_KEY, "true");
      sessionStorage.setItem(this.USER_KEY, username);
      return true;
    }
    return false;
  },

  logout() {
    sessionStorage.removeItem(this.AUTH_KEY);
    sessionStorage.removeItem(this.USER_KEY);
  },

  requireAuth(redirectUrl = "admin-login") {
    if (!this.isAuthenticated()) {
      SPA.navigate(SPA.routeFromPage(redirectUrl));
      return false;
    }
    return true;
  }
};

/**
 * Build org KB articles from spreadsheet rows (Excel export / CSV).
 * Shared by admin upload and scripts/sync-kb-from-excel.js.
 */
const KbSpreadsheet = {
  STUB_STEPS: [
    "Refer to the full KB article for detailed steps.",
    "Contact IT if you need assistance."
  ],

  extractCategory(title) {
    const match = (title || "").match(/\[([^\]]+)\]/);
    return match ? match[1] : "General";
  },

  titleKeywords(title) {
    return (title || "")
      .toLowerCase()
      .replace(/[^\w\s]/g, " ")
      .split(/\s+/)
      .filter((w) => w.length > 2);
  },

  deriveSymptoms(title) {
    const symptoms = [];
    const stripped = (title || "").replace(/^\[[^\]]+\]\s*/, "").trim();
    if (!stripped) return symptoms;
    if (stripped.length >= 8 && stripped.length <= 100) {
      symptoms.push(stripped);
    }
    const afterDash = stripped.split(/\s[-—]\s/)[0]?.trim();
    if (afterDash && afterDash !== stripped && afterDash.length >= 8) {
      symptoms.push(afterDash);
    }
    return [...new Set(symptoms)].slice(0, 2);
  },

  articleFromRow(id, title, existing) {
    const cleanId = (id || "").trim();
    const cleanTitle = (title || "").trim();
    if (!cleanId || !cleanTitle) return null;

    const derivedSymptoms = this.deriveSymptoms(cleanTitle);

    if (existing) {
      return {
        ...existing,
        id: cleanId,
        title: cleanTitle,
        category: existing.category || this.extractCategory(cleanTitle),
        symptoms: existing.symptoms?.length ? existing.symptoms : derivedSymptoms
      };
    }

    return {
      id: cleanId,
      title: cleanTitle,
      category: this.extractCategory(cleanTitle),
      keywords: this.titleKeywords(cleanTitle),
      symptoms: derivedSymptoms,
      priority: 3,
      steps: [...this.STUB_STEPS],
      url: ""
    };
  },

  buildKbFromRows(rows, existingKb) {
    const existingById = new Map((existingKb?.articles || []).map((a) => [a.id, a]));
    const articles = [];

    for (const row of rows) {
      const article = this.articleFromRow(row.id, row.title, existingById.get(row.id));
      if (article) articles.push(article);
    }

    if (articles.length === 0) {
      throw new Error("Spreadsheet must contain at least one article row");
    }

    return {
      version: existingKb?.version || "1.0.0",
      lastUpdated: new Date().toISOString().slice(0, 10),
      articles,
      flows: [],
      synonyms: existingKb?.synonyms || {}
    };
  },

  normalizeHeader(header) {
    return (header || "").trim().replace(/^"|"$/g, "").toLowerCase();
  },

  findColumnIndexes(headers) {
    const normalized = headers.map((h) => this.normalizeHeader(h));
    const idIdx = normalized.findIndex((h) => /^(number|id|kb number|kb id)$/.test(h) || /^number$/.test(h));
    const titleIdx = normalized.findIndex((h) =>
      /^(short description|description|title|short desc)$/.test(h)
    );
    if (idIdx < 0 || titleIdx < 0) {
      throw new Error('Spreadsheet must have "Number" and "Short description" columns');
    }
    return { idIdx, titleIdx };
  },

  rowsFromAoA(aoa) {
    if (!aoa || aoa.length < 2) {
      throw new Error("Spreadsheet must have a header row and at least one data row");
    }
    const { idIdx, titleIdx } = this.findColumnIndexes(aoa[0].map((c) => String(c ?? "")));
    const rows = [];
    for (let i = 1; i < aoa.length; i++) {
      const line = aoa[i] || [];
      rows.push({
        id: String(line[idIdx] ?? "").trim(),
        title: String(line[titleIdx] ?? "").trim()
      });
    }
    return rows;
  },

  parseCsvLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        inQuotes = !inQuotes;
      } else if (ch === "," && !inQuotes) {
        result.push(current);
        current = "";
      } else {
        current += ch;
      }
    }
    result.push(current);
    return result.map((s) => s.replace(/^"|"$/g, "").trim());
  },

  parseCsv(text, existingKb) {
    const lines = text.split(/\r?\n/).filter((l) => l.trim());
    if (lines.length < 2) throw new Error("CSV must have header and data rows");

    const headers = this.parseCsvLine(lines[0]);
    const { idIdx, titleIdx } = this.findColumnIndexes(headers);
    const rows = [];

    for (let i = 1; i < lines.length; i++) {
      const cols = this.parseCsvLine(lines[i]);
      rows.push({
        id: (cols[idIdx] || "").trim(),
        title: (cols[titleIdx] || "").trim()
      });
    }

    return this.buildKbFromRows(rows, existingKb);
  }
};

/**
 * Login page controller.
 */
const Login = {
  init() {
    Themes.init();

    if (Session.isLoggedIn()) {
      if (Storage.isCaseSetupComplete()) {
        SPA.navigate("troubleshooting");
      } else {
        SPA.navigate("case");
      }
      return;
    }

    const remembered = Storage.getRememberedEmployeeId();
    const input = document.getElementById("employeeId");
    const rememberCheckbox = document.getElementById("rememberMe");

    if (remembered) {
      input.value = remembered;
      rememberCheckbox.checked = true;
    }

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      this.handleLogin();
    });
  },

  validateEmployeeId(id) {
    const trimmed = (id || "").trim();
    if (!trimmed) return "Employee ID is required.";
    if (!/^[a-zA-Z0-9._-]+$/.test(trimmed)) {
      return "Employee ID may only contain letters, numbers, dots, dashes, and underscores.";
    }
    if (trimmed.length > 50) return "Employee ID is too long.";
    return null;
  },

  showError(msg) {
    const el = document.getElementById("loginError");
    el.textContent = msg;
    el.hidden = !msg;
  },

  async handleLogin() {
    const input = document.getElementById("employeeId");
    const remember = document.getElementById("rememberMe").checked;
    const employeeId = input.value.trim();

    const error = this.validateEmployeeId(employeeId);
    if (error) {
      this.showError(error);
      return;
    }

    this.showError("");
    Session.login(employeeId, remember);
    Logger.init(employeeId);
    await Logger.logLogin(employeeId);

    SPA.navigate("case");
  }
};



/**
 * Case setup page — Chat IMS, OS, Environment before troubleshooting.
 */
const CaseSetup = {
  isEditMode() {
    const params = SPA.getQuery();
    return params.get("edit") === "1";
  },

  init() {
    Session.ensureAnonymousSession();
    Logger.init(Session.getAgentId());

    const existing = Session.getCaseDetails();
    const editing = this.isEditMode();
    const display = document.getElementById("userDisplay");
    if (display && existing.chatIms) {
      display.textContent = "IMS: " + existing.chatIms;
    } else if (display) {
      display.hidden = true;
    }
    if (existing.chatIms) {
      document.getElementById("chatImsInput").value = existing.chatIms;
    }
    if (existing.platform) {
      document.getElementById("platformSelect").value = existing.platform;
    }
    if (existing.environment) {
      document.getElementById("environmentSelect").value = existing.environment;
    }

    if (existing.chatIms && Storage.isCaseSetupComplete() && !editing) {
      SPA.navigate("troubleshooting");
      return;
    }

    if (editing) {
      const title = document.querySelector(".case-setup-card h2");
      const submitBtn = document.querySelector("#caseForm button[type='submit']");
      const subtitle = document.querySelector(".login-hint");
      if (title) title.textContent = "Edit Case Details";
      if (submitBtn) submitBtn.textContent = "Save & return to troubleshooting";
      if (subtitle) {
        subtitle.textContent = "Update chat IMS, platform, or environment for this session.";
      }
    }

    document.getElementById("caseForm").addEventListener("submit", (e) => {
      e.preventDefault();
      this.handleSubmit();
    });
  },

  validate(chatIms) {
    const trimmed = (chatIms || "").trim();
    if (!trimmed) return "Chat IMS Number is required.";
    if (trimmed.length > 80) return "Chat IMS Number is too long.";
    return null;
  },

  showError(msg) {
    const el = document.getElementById("caseError");
    el.textContent = msg;
    el.hidden = !msg;
  },

  async handleSubmit() {
    const chatIms = document.getElementById("chatImsInput").value.trim();
    const platform = document.getElementById("platformSelect").value;
    const environment = document.getElementById("environmentSelect").value;

    const error = this.validate(chatIms);
    if (error) {
      this.showError(error);
      return;
    }

    this.showError("");
    Session.saveCaseDetails(chatIms, platform, environment);

    try {
      await Logger.log("case_setup", {
        details: "Chat IMS: " + chatIms + ", Platform: " + platform + ", Environment: " + environment
      });
    } catch (err) {
      console.warn("Case setup logging failed:", err);
    }
    SPA.navigate("troubleshooting");
  }
};



/**
 * Main application controller — org KB hub (secondary browse).
 */
const App = {
  kbData: null,
  searchDebounce: null,
  suggestionState: null,
  browseShowAll: false,

  async init() {
    if (!Session.requireCaseSetup()) return;

    ThemePicker.mount("#themePickerMount");
    Themes.init();
    this.bindEvents();
    await this.loadKb();
    this.initUser();
    this.renderSessionSummary();
    this.renderCategories();
    this.renderAllIssues();
    Logger.logAppLaunch();
    this.updateStatus("Ready");
  },

  bindEvents() {
    const searchInput = document.getElementById("searchInput");
    const platform = PlatformMatch.getSessionPlatform();

    this.suggestionState = SearchSuggestions.mount(searchInput, {
      getSuggestions: (q) =>
        Promise.resolve(
          SearchEngine.search(q, 8, { platform }).map((article) => ({
            ...article,
            type: "kb",
            badge: "Org KB"
          }))
        ),
      onSelect: (item) => GuideResolver.openItem(item),
      onSubmit: (q) => this.handleSearch(q)
    });

    searchInput?.addEventListener("input", (e) => {
      clearTimeout(this.searchDebounce);
      this.searchDebounce = setTimeout(() => this.handleSearch(e.target.value), 250);
    });
    document.getElementById("clearSearch")?.addEventListener("click", () => {
      searchInput.value = "";
      this.browseShowAll = false;
      SearchSuggestions.hide(this.suggestionState);
      this.renderAllIssues();
    });

    document.getElementById("escalateBtn")?.addEventListener("click", () => this.escalate());

    document.getElementById("refreshKb")?.addEventListener("click", async () => {
      Storage.clearKbCache();
      await this.loadKb(true);
      this.renderAllIssues();
      this.showToast("Knowledge base refreshed.");
    });

    document.getElementById("startOverBtn")?.addEventListener("click", () => {
      Session.logout();
      SPA.navigate("case");
    });

    document.getElementById("editCaseBtn")?.addEventListener("click", () => {
      window.location.href = "case.html?edit=1";
    });
  },

  renderSessionSummary() {
    HubUi.renderSessionBadges(
      document.getElementById("sessionSummary"),
      Session.getCaseDetails()
    );
  },

  async loadKb(forceRefresh = false) {
    this.updateStatus("Loading knowledge base...");
    this.kbData = await KbLoader.load(forceRefresh);
    const count = this.kbData?.articles?.length || 0;
    this.updateStatus(count ? "KB loaded (" + count + " articles)" : "KB load failed - using empty set", !count);
  },

  initUser() {
    Session.ensureAnonymousSession();
    const identity = Session.getLogIdentity();
    Logger.init(Session.getAgentId());
    const display = document.getElementById("userDisplay");
    if (display) display.textContent = "IMS: " + identity;
  },

  handleSearch(query) {
    const q = (query || "").trim();
    const platform = PlatformMatch.getSessionPlatform();
    this.browseShowAll = false;
    if (!q) {
      this.renderAllIssues();
      return;
    }
    const results = SearchEngine.search(q, 12, { platform });
    Logger.logSearch(q, results.length);
    this.renderSearchResults(results, { query: q });
  },

  renderAllIssues() {
    const platform = PlatformMatch.getSessionPlatform();
    const articles = (this.kbData?.articles || []).filter((a) =>
      PlatformMatch.articleAppliesToPlatform(a, platform)
    );
    this.renderSearchResults(
      articles.map((article) => ({
        ...article,
        type: "kb",
        matchLabel: "Available",
        badge: "Org KB"
      })),
      { query: "", total: articles.length }
    );
    document.getElementById("noResults").hidden = articles.length > 0;
  },

  renderSearchResults(results, meta = {}) {
    const container = document.getElementById("searchResults");
    const noResults = document.getElementById("noResults");
    const query = meta.query ?? document.getElementById("searchInput")?.value ?? "";
    const total = meta.total ?? this.kbData?.articles?.length ?? results.length;
    const showAll = meta.showAll ?? this.browseShowAll;
    const { visible, limited, hiddenCount } = HubUi.getVisibleResults(
      results,
      showAll ? { limit: results.length } : {}
    );
    container.classList.toggle("result-grid-expanded", showAll || !limited);

    HubUi.updateResultCount(document.getElementById("resultCount"), {
      displayed: visible.length,
      total: query ? results.length : total,
      query: (query || "").trim(),
      limited,
      noun: "articles",
      singular: "article"
    });

    container.innerHTML = "";

    if (!results.length) {
      noResults.hidden = false;
      return;
    }
    noResults.hidden = true;

    visible.forEach((article) => {
      const stepCount = (article.steps || []).length;
      const card = document.createElement("article");
      card.className = "result-card issue-card";
      HubUi.applyCategory(card, article.category);
      card.innerHTML =
        '<div class="result-meta">' +
        '<span class="type-badge type-badge-kb">Org KB</span>' +
        '<span class="kb-id">' + this.escape(article.id) + "</span>" +
        (article.matchLabel && article.matchLabel !== "Available"
          ? '<span class="match-badge">' + this.escape(article.matchLabel) + "</span>"
          : "") +
        '<span class="step-count">' + stepCount + " step" + (stepCount !== 1 ? "s" : "") + "</span>" +
        "</div>" +
        "<h3>" + this.escape(article.title) + "</h3>" +
        (article.category
          ? '<p class="category-line"><span class="category-tag">' + this.escape(article.category) + "</span></p>"
          : "") +
        HubUi.buildSymptomTagsHtml(article.symptoms, 2, (s) => this.escape(s));
      card.addEventListener("click", () => GuideResolver.openItem({ ...article, type: "kb" }));
      container.appendChild(card);
    });

    HubUi.renderShowAllButton(container.parentElement, {
      limited: limited && !showAll,
      hiddenCount,
      onShowAll: () => {
        this.browseShowAll = true;
        this.renderSearchResults(results, { ...meta, showAll: true });
      }
    });
  },

  openArticle(article) {
    GuideResolver.openItem({ ...article, type: "kb" });
  },

  escalate() {
    Session.setEscalated();
    const reason =
      "Case escalated — no matching KB. Last search: " +
      (document.getElementById("searchInput")?.value || "N/A");
    Logger.logEscalation(reason);
    this.showToast("Case escalated. Include this in your session notes when documenting the ticket.");
  },

  renderCategories() {
    const container = document.getElementById("categoryFilters");
    if (!container) return;
    container.innerHTML = "";
    SearchEngine.getCategories().forEach((cat) => {
      const btn = document.createElement("button");
      btn.className = "category-chip";
      btn.textContent = cat;
      HubUi.applyCategory(btn, cat);
      btn.addEventListener("click", () => {
        document.getElementById("searchInput").value = cat;
        this.handleSearch(cat);
      });
      container.appendChild(btn);
    });
  },

  updateStatus(msg, isError = false) {
    const el = document.getElementById("statusBar");
    if (el) {
      el.textContent = msg;
      el.classList.toggle("error", isError);
    }
  },

  showToast(msg) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  },

  escape(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }
};

/**

 * Step-by-step KB guide page controller.

 */

const Guide = {

  article: null,

  currentStepIndex: 0,

  rawSteps: [],

  steps: [],

  imageBasePath: "assets/images/",



  async init() {

    if (!Session.requireCaseSetup()) return;



    ThemePicker.mount("#themePickerMount");

    Themes.init();

    Logger.init(Session.getAgentId());



    const params = SPA.getQuery();

    const kbId = params.get("kb");

    if (!kbId) {

      this.showError("No KB article specified.");

      return;

    }



    this.bindEvents();

    await KbLoader.load();

    const kb = KbLoader.getData();

    this.imageBasePath = kb?.imageBasePath || "assets/images/";

    this.article = KbLoader.getArticle(kbId);



    if (!this.article) {

      this.showError("KB article not found: " + kbId);

      return;

    }



    this.rawSteps = this.article.steps || [];

    if (!this.rawSteps.length) {

      this.rawSteps = [

        "Refer to the full KB article for detailed steps.",

        "Contact IT if you need assistance."

      ];

    }



    const platform = Session.getCaseDetails()?.platform || "Windows";

    this.steps = StepUtils.filterSteps(this.rawSteps, platform);

    if (!this.steps.length) {
      this.showError(
        "No steps available for platform \"" + platform + "\". Use Edit Case to change platform."
      );
      return;
    }



    const existing = Session.getGuideSession();

    if (!existing || existing.kbId !== kbId) {

      Session.startGuide(this.article.id, this.article.title, this.steps.length, "kb");

    } else {

      Session.updateGuideSession({ stepCount: this.steps.length });

      this.currentStepIndex = Math.min(

        existing.currentStepIndex || 0,

        Math.max(0, this.steps.length - 1)

      );

    }



    document.getElementById("guideLoading").hidden = true;

    document.getElementById("guideContent").hidden = false;

    document.getElementById("guideSubtitle").textContent = this.article.title;



    const link = document.getElementById("kbDocLink");
    if (link) {
      const url = (this.article.url || "").trim();
      if (/^https?:\/\//i.test(url)) {
        link.href = url;
        link.hidden = false;
      } else {
        link.removeAttribute("href");
        link.hidden = true;
      }
    }

    Logger.logArticleView(this.article);

    this.render();

  },



  bindEvents() {

    document.getElementById("backBtn")?.addEventListener("click", () => this.goBack());

    document.getElementById("continueBtn")?.addEventListener("click", () => this.goNext());

    document.getElementById("resolvedBtn")?.addEventListener("click", () => this.markResolved());

    document.getElementById("escalateBtn")?.addEventListener("click", () => this.escalate());

    document.getElementById("copyNotesBtn")?.addEventListener("click", () => this.copyNotes());



    document.getElementById("agentComments")?.addEventListener("input", () => {

      this.saveAgentComments();

    });



    document.getElementById("startOverBtn")?.addEventListener("click", () => {

      Session.logout();

      SPA.navigate("case");

    });



    document.getElementById("stepImage")?.addEventListener("error", (e) => {

      const fig = document.getElementById("stepFigure");

      if (fig) fig.hidden = true;

      e.target.removeAttribute("src");

    });

  },



  render() {

    this.renderStepPills();

    this.renderInstruction();

    this.renderSessionNotes();

    this.loadAgentComments();

    this.updateNavButtons();

  },



  saveAgentComments() {

    const el = document.getElementById("agentComments");

    if (!el) return;

    Session.updateGuideSession({ agentComments: el.value });

  },



  loadAgentComments() {

    const session = Session.getGuideSession();

    const el = document.getElementById("agentComments");

    if (el && session && document.activeElement !== el) {

      el.value = session.agentComments || "";

    }

  },



  renderStepPills() {

    const container = document.getElementById("stepPills");

    container.innerHTML = "";



    this.steps.forEach((step, i) => {

      const pill = document.createElement("div");

      pill.className = "step-pill";

      if (i < this.currentStepIndex) pill.classList.add("completed");

      else if (i === this.currentStepIndex) pill.classList.add("active");

      else pill.classList.add("pending");



      const label = StepUtils.getLabel(step, i);

      const hasImg = StepUtils.getImage(step, this.imageBasePath);

      pill.innerHTML =

        '<span class="pill-number">' + (i + 1) + "</span>" +

        '<span class="pill-label">' + this.escape(label) + "</span>" +

        (hasImg ? '<span class="pill-visual" title="Has screenshot">&#128247;</span>' : "");

      container.appendChild(pill);

    });

  },



  renderInstruction() {

    const step = this.steps[this.currentStepIndex];

    const text = StepUtils.getText(step);

    document.getElementById("instructionText").textContent = text;



    const fig = document.getElementById("stepFigure");

    const img = document.getElementById("stepImage");

    const caption = document.getElementById("stepImageCaption");

    const tipEl = document.getElementById("stepTip");

    const platformNote = document.getElementById("stepPlatformNote");



    const src = StepUtils.getImage(step, this.imageBasePath);

    if (src && img && fig) {

      img.src = src;

      img.alt = StepUtils.getAlt(step) || text;

      if (caption) caption.textContent = StepUtils.getAlt(step) || "";

      fig.hidden = false;

    } else if (fig) {

      fig.hidden = true;

      if (img) img.removeAttribute("src");

    }



    const tip = StepUtils.getTip(step);

    if (tipEl) {

      if (tip) {

        tipEl.textContent = tip;

        tipEl.hidden = false;

      } else {

        tipEl.hidden = true;

        tipEl.textContent = "";

      }

    }



    const platforms = StepUtils.getPlatforms(step);

    if (platformNote) {

      if (platforms && platforms.length) {

        platformNote.textContent = "Applies to: " + platforms.join(", ");

        platformNote.hidden = false;

      } else {

        platformNote.hidden = true;

      }

    }

  },



  renderSessionNotes() {

    const session = Session.getGuideSession();

    if (!session) return;



    document.getElementById("noteDateTime").textContent = new Date().toLocaleString();

    document.getElementById("noteChatIms").textContent = session.chatIms || "N/A";

    document.getElementById("notePlatform").textContent = session.platform || "N/A";

    document.getElementById("noteEnvironment").textContent = session.environment || "N/A";

    document.getElementById("noteIssue").textContent =

      (session.kbTitle || "") + " (" + (session.kbId || "") + ")";



    const step = this.steps[this.currentStepIndex];

    const stepNum = this.currentStepIndex + 1;

    document.getElementById("noteCurrentStep").textContent =

      stepNum + "/" + this.steps.length + " - " + StepUtils.getLabel(step, this.currentStepIndex);



    const resolutionEl = document.getElementById("noteResolution");

    resolutionEl.textContent = session.resolution || "In Progress";

    resolutionEl.className = "resolution-" + (session.resolution || "in-progress")

      .toLowerCase()

      .replace(/\s+/g, "-");



    const escalatedEl = document.getElementById("noteCaseEscalated");

    if (escalatedEl) {

      escalatedEl.textContent = session.caseEscalated ? "Yes" : "No";

      escalatedEl.className = session.caseEscalated ? "resolution-escalated" : "";

    }



    const stepsList = document.getElementById("noteStepsTaken");

    stepsList.innerHTML = "";

    if (session.stepsTaken?.length) {

      session.stepsTaken.forEach((s) => {

        const li = document.createElement("li");

        li.textContent = s.text;

        stepsList.appendChild(li);

      });

    } else {

      const li = document.createElement("li");

      li.textContent = "No steps recorded yet.";

      li.className = "muted";

      stepsList.appendChild(li);

    }

  },



  updateNavButtons() {

    document.getElementById("backBtn").disabled = this.currentStepIndex === 0;

    const isLast = this.currentStepIndex >= this.steps.length - 1;

    document.getElementById("continueBtn").hidden = isLast;

  },



  recordCurrentStep() {

    const step = this.steps[this.currentStepIndex];

    const stepText = StepUtils.getText(step);

    Session.recordStepTaken(this.currentStepIndex, stepText);

    Logger.logStepProgress(

      this.article.id,

      this.article.title,

      this.currentStepIndex + 1,

      stepText

    );

  },



  goBack() {

    if (this.currentStepIndex > 0) {

      this.currentStepIndex--;

      Session.updateGuideSession({ currentStepIndex: this.currentStepIndex });

      this.render();

    }

  },



  goNext() {

    this.recordCurrentStep();

    if (this.currentStepIndex < this.steps.length - 1) {

      this.currentStepIndex++;

      Session.updateGuideSession({ currentStepIndex: this.currentStepIndex });

      this.render();

    } else {

      this.showToast("Last step reached. Mark as resolved or escalate.");

      this.renderSessionNotes();

    }

  },



  markResolved() {

    this.recordCurrentStep();

    Session.setResolution("Resolved");

    Logger.logResolution(this.article.id, this.article.title);

    this.renderSessionNotes();

    this.showToast("Issue marked as resolved.");

  },



  escalate() {

    this.recordCurrentStep();

    Session.setEscalated();

    Logger.logEscalation(

      "Case escalated at step " + (this.currentStepIndex + 1),

      this.article.id,

      this.article.title

    );

    this.renderSessionNotes();

    this.showToast("Case escalated. Use Copy Notes to paste into your ticket.");

  },



  async copyNotes() {

    this.saveAgentComments();

    const ok = await Session.copyNotes();

    if (ok) {

      const session = Session.getGuideSession();

      Logger.logCopyNotes(session?.kbId, session?.kbTitle);

      this.showToast("Notes copied to clipboard.");

    } else {

      this.showToast("Could not copy notes. Please try again.");

    }

  },



  showError(msg) {

    document.getElementById("guideLoading").hidden = true;

    const el = document.getElementById("guideError");

    el.textContent = msg;

    el.hidden = false;

  },



  showToast(msg) {

    const toast = document.getElementById("toast");

    if (!toast) return;

    toast.textContent = msg;

    toast.classList.add("show");

    setTimeout(() => toast.classList.remove("show"), 3000);

  },



  escape(str) {

    const div = document.createElement("div");

    div.textContent = str || "";

    return div.innerHTML;

  }

};

/**
 * Troubleshooting hub — primary symptom-first entry point.
 */
const TroubleshootingApp = {
  data: null,
  currentFlow: null,
  flowStepIndex: 0,
  searchDebounce: null,
  suggestionState: null,
  browseShowAll: false,

  async init() {
    if (!Session.requireCaseSetup()) return;

    ThemePicker.mount("#themePickerMount");
    Themes.init();
    this.bindEvents();
    await this.loadData();
    await KbLoader.load();
    this.initUser();
    this.renderSessionSummary();
    this.renderQuickFlows();
    this.renderCategories();
    this.renderAllGuides();
    Logger.logAppLaunch();
    this.updateStatus("Ready");
    this.maybeStartFlowFromUrl();
  },

  bindEvents() {
    const searchInput = document.getElementById("searchInput");

    this.suggestionState = SearchSuggestions.mount(searchInput, {
      getSuggestions: (q) => Promise.resolve(UnifiedSearch.suggest(q, { limit: 10, kbReserve: 3 })),
      onSelect: (item) => {
        if (item.type === "flow" && item.flow) {
          this.startFlow(item.flow);
          return;
        }
        GuideResolver.openItem(item);
      },
      onSubmit: (q) => this.handleSearch(q)
    });

    searchInput?.addEventListener("input", (e) => {
      clearTimeout(this.searchDebounce);
      this.searchDebounce = setTimeout(() => this.handleSearch(e.target.value), 250);
    });
    document.getElementById("clearSearch")?.addEventListener("click", () => {
      searchInput.value = "";
      this.browseShowAll = false;
      SearchSuggestions.hide(this.suggestionState);
      this.renderAllGuides();
    });

    document.getElementById("closeFlow")?.addEventListener("click", () => this.closeFlow());
    document.getElementById("escalateBtn")?.addEventListener("click", () => this.escalate());

    document.getElementById("editCaseBtn")?.addEventListener("click", () => {
      window.location.href = "case.html?edit=1";
    });

    document.getElementById("refreshGuide")?.addEventListener("click", async () => {
      Storage.clearTsGuideCache();
      await this.loadData(true);
      await KbLoader.load(true);
      this.renderAllGuides();
      this.showToast("Troubleshooting guide refreshed.");
    });

    document.getElementById("startOverBtn")?.addEventListener("click", () => {
      Session.logout();
      SPA.navigate("case");
    });

    document.querySelectorAll(".ts-flow-chip[data-flow]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const flowId = btn.getAttribute("data-flow");
        const flow = TroubleshootingSearch.getFlows().find((f) => f.id === flowId);
        if (flow) this.startFlow(flow);
      });
    });
  },

  renderSessionSummary() {
    HubUi.renderSessionBadges(
      document.getElementById("sessionSummary"),
      Session.getCaseDetails()
    );
  },

  async loadData(forceRefresh = false) {
    this.updateStatus("Loading troubleshooting guide...");
    this.data = await TroubleshootingLoader.load(forceRefresh);
    const count = this.data?.guides?.length || 0;
    this.updateStatus(
      count ? "Guide loaded (" + count + " topics)" : "Guide load failed",
      !count
    );
  },

  maybeStartFlowFromUrl() {
    const flowId = SPA.getQuery().get("flow");
    if (!flowId) return;
    const flow = TroubleshootingSearch.getFlows().find((f) => f.id === flowId);
    if (flow) this.startFlow(flow);
  },

  initUser() {
    Session.ensureAnonymousSession();
    const identity = Session.getLogIdentity();
    Logger.init(Session.getAgentId());
    const display = document.getElementById("userDisplay");
    if (display) display.textContent = "IMS: " + identity;
  },

  handleSearch(query) {
    const q = (query || "").trim();
    this.browseShowAll = false;
    if (!q) {
      this.renderAllGuides();
      return;
    }
    const results = UnifiedSearch.search(q);
    Logger.logSearch(q, results.length);
    this.renderGuideResults(results, { query: q });
  },

  renderAllGuides() {
    const platform = PlatformMatch.getSessionPlatform();
    const guides = (this.data?.guides || []).filter((g) =>
      PlatformMatch.guideAppliesToPlatform(g, platform)
    );
    this.renderGuideResults(
      guides.map((g) => ({
        ...g,
        type: "troubleshooting",
        matchLabel: "Available",
        badge: "Guide"
      })),
      { query: "", total: guides.length }
    );
    document.getElementById("noResults").hidden = guides.length > 0;
  },

  renderGuideResults(results, meta = {}) {
    const container = document.getElementById("searchResults");
    const noResults = document.getElementById("noResults");
    const query = meta.query ?? document.getElementById("searchInput")?.value ?? "";
    const total = meta.total ?? this.data?.guides?.length ?? results.length;
    const showAll = meta.showAll ?? this.browseShowAll;
    const { visible, limited, hiddenCount } = HubUi.getVisibleResults(
      results,
      showAll ? { limit: results.length } : {}
    );
    container.classList.toggle("result-grid-expanded", showAll || !limited);

    HubUi.updateResultCount(document.getElementById("resultCount"), {
      displayed: visible.length,
      total: query ? results.length : total,
      query: (query || "").trim(),
      limited,
      noun: "results",
      singular: "result"
    });

    container.innerHTML = "";

    if (!results.length) {
      noResults.hidden = false;
      return;
    }
    noResults.hidden = true;

    visible.forEach((item) => {
      const isKb = item.type === "kb";
      const stepCount = (item.steps || []).length;
      const hasVisuals = !isKb && StepUtils.articleHasImages(item);
      const card = document.createElement("article");
      card.className = "result-card issue-card";
      HubUi.applyCategory(card, item.category);
      card.innerHTML =
        '<div class="result-meta">' +
        '<span class="type-badge type-badge-' +
        (isKb ? "kb" : "guide") +
        '">' +
        this.escape(item.badge || (isKb ? "Org KB" : "Guide")) +
        "</span>" +
        '<span class="kb-id">' + this.escape(item.id) + "</span>" +
        (item.matchLabel && item.matchLabel !== "Available"
          ? '<span class="match-badge">' + this.escape(item.matchLabel) + "</span>"
          : "") +
        (hasVisuals ? '<span class="visual-badge">Has visuals</span>' : "") +
        '<span class="step-count">' + stepCount + " step" + (stepCount !== 1 ? "s" : "") + "</span>" +
        "</div>" +
        "<h3>" + this.escape(item.title) + "</h3>" +
        (item.category
          ? '<p class="category-line"><span class="category-tag">' + this.escape(item.category) + "</span></p>"
          : "") +
        HubUi.buildSymptomTagsHtml(item.symptoms, 2, (s) => this.escape(s));
      card.addEventListener("click", () => GuideResolver.openItem(item));
      container.appendChild(card);
    });

    HubUi.renderShowAllButton(container.parentElement, {
      limited: limited && !showAll,
      hiddenCount,
      onShowAll: () => {
        this.browseShowAll = true;
        this.renderGuideResults(results, { ...meta, showAll: true });
      }
    });
  },

  openGuide(guide) {
    GuideResolver.openItem({ ...guide, type: "troubleshooting" });
  },

  escalate() {
    Session.setEscalated();
    const reason =
      "Case escalated — no matching guide. Last search: " +
      (document.getElementById("searchInput")?.value || "N/A");
    Logger.logEscalation(reason);
    this.showToast("Case escalated. Include this in your session notes.");
  },

  renderQuickFlows() {
    const container = document.getElementById("quickFlows");
    if (!container) return;
    container.innerHTML = "";
    TroubleshootingSearch.getFlows().forEach((flow) => {
      const btn = document.createElement("button");
      btn.className = "flow-chip flow-tile";
      btn.textContent = flow.title;
      btn.addEventListener("click", () => this.startFlow(flow));
      container.appendChild(btn);
    });
  },

  renderCategories() {
    const container = document.getElementById("categoryFilters");
    if (!container) return;
    container.innerHTML = "";
    TroubleshootingSearch.getCategories().forEach((cat) => {
      const btn = document.createElement("button");
      btn.className = "category-chip";
      btn.textContent = cat;
      HubUi.applyCategory(btn, cat);
      btn.addEventListener("click", () => {
        document.getElementById("searchInput").value = cat;
        this.handleSearch(cat);
      });
      container.appendChild(btn);
    });
  },

  startFlow(flow) {
    this.currentFlow = flow;
    this.flowStepIndex = 0;
    Logger.logFlowStart(flow);
    const panel = document.getElementById("flowPanel");
    panel.hidden = false;
    panel.scrollIntoView({ behavior: "smooth", block: "start" });
    this.renderFlowStep();
  },

  renderFlowStep() {
    const flow = this.currentFlow;
    if (!flow) return;

    let step = flow.steps[this.flowStepIndex];
    if (step.id) {
      step = flow.steps.find((s) => s.id === step.id) || step;
    }

    document.getElementById("flowTitle").textContent = flow.title;
    document.getElementById("flowQuestion").textContent = step.question;

    const optionsEl = document.getElementById("flowOptions");
    optionsEl.innerHTML = "";

    (step.options || []).forEach((opt) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "flow-option";
      btn.textContent = opt.label;
      btn.addEventListener("click", () => this.handleFlowChoice(step, opt));
      optionsEl.appendChild(btn);
    });

    document.getElementById("flowGuideResults").innerHTML = "";
  },

  getOptionGuideIds(option) {
    return option.guideIds || option.kbIds || [];
  },

  handleFlowChoice(step, option) {
    Logger.logFlowStep(this.currentFlow.id, step.question, option.label);

    const guideIds = this.getOptionGuideIds(option);
    const targets = GuideResolver.resolveFlowTargets(guideIds);

    if (option.action === "escalate") {
      this.escalate();
      if (targets.length === 1) {
        GuideResolver.openItem({ ...targets[0].item, type: targets[0].type });
      } else if (targets.length > 1) {
        this.renderFlowGuideResults(targets);
      }
      return;
    }

    if (option.action === "resolved") {
      Session.setResolution("Resolved");
      Logger.logResolution(this.currentFlow?.id || "", this.currentFlow?.title || "");
      this.showToast("Glad that resolved your issue!");
      this.closeFlow();
      return;
    }

    if (option.next) {
      const nextIdx = this.currentFlow.steps.findIndex((s) => s.id === option.next);
      if (nextIdx >= 0) {
        this.flowStepIndex = nextIdx;
        this.renderFlowStep();
        return;
      }
    }

    if (targets.length === 1) {
      GuideResolver.openItem({ ...targets[0].item, type: targets[0].type });
      return;
    }

    if (targets.length > 1) {
      this.renderFlowGuideResults(targets);
      this.showToast("Select a guide below to start step-by-step troubleshooting.");
      return;
    }

    this.showToast("Continue with the next question or mark case as escalated.");
  },

  renderFlowGuideResults(targets) {
    const container = document.getElementById("flowGuideResults");
    container.innerHTML = "<h4>Start troubleshooting</h4>";
    targets.forEach((target) => {
      const item = target.item;
      const card = document.createElement("button");
      card.type = "button";
      card.className = "flow-kb-card";
      const steps = (item.steps || []).length;
      const badge = target.type === "kb" ? "Org KB" : "Guide";
      card.innerHTML =
        "<span class='type-badge type-badge-" +
        (target.type === "kb" ? "kb" : "guide") +
        "'>" +
        this.escape(badge) +
        "</span> " +
        "<strong>" +
        this.escape(item.id) +
        "</strong>: " +
        this.escape(item.title) +
        " <span class='step-count-inline'>(" +
        steps +
        " steps)</span>";
      card.addEventListener("click", () => GuideResolver.openItem({ ...item, type: target.type }));
      container.appendChild(card);
    });
    container.scrollIntoView({ behavior: "smooth", block: "nearest" });
  },

  closeFlow() {
    document.getElementById("flowPanel").hidden = true;
    this.currentFlow = null;
    this.flowStepIndex = 0;
  },

  updateStatus(msg, isError = false) {
    const el = document.getElementById("statusBar");
    if (el) {
      el.textContent = msg;
      el.classList.toggle("error", isError);
    }
  },

  showToast(msg) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  },

  escape(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }
};

if (typeof window !== "undefined") {
  window.TroubleshootingApp = TroubleshootingApp;
}


/**
 * Step-by-step research troubleshooting guide page (separate from org KB).
 */
const TroubleshootingGuide = {
  guide: null,
  currentStepIndex: 0,
  rawSteps: [],
  steps: [],
  imageBasePath: "assets/images/",

  async init() {
    if (!Session.requireCaseSetup()) return;

    ThemePicker.mount("#themePickerMount");
    Themes.init();
    Logger.init(Session.getAgentId());

    const params = SPA.getQuery();
    const guideId = params.get("guide");
    if (!guideId) {
      this.showError("No troubleshooting guide specified.");
      return;
    }

    this.bindEvents();
    await TroubleshootingLoader.load();
    await KbLoader.load();
    const data = TroubleshootingLoader.getData();
    this.imageBasePath = data?.imageBasePath || "assets/images/";
    this.guide = TroubleshootingLoader.getGuide(guideId);

    if (!this.guide) {
      this.showError("Troubleshooting guide not found: " + guideId);
      return;
    }

    this.rawSteps = this.guide.steps || [];
    if (!this.rawSteps.length) {
      this.rawSteps = ["Follow standard troubleshooting procedures.", "Contact IT if you need assistance."];
    }

    const platform = Session.getCaseDetails()?.platform || "Windows";
    this.steps = StepUtils.filterSteps(this.rawSteps, platform);
    if (!this.steps.length) {
      this.showError(
        "No steps available for platform \"" + platform + "\". Use Edit Case to change platform."
      );
      return;
    }

    const existing = Session.getGuideSession();
    if (!existing || existing.kbId !== guideId || existing.guideType !== "troubleshooting") {
      Session.startGuide(this.guide.id, this.guide.title, this.steps.length, "troubleshooting");
    } else {
      Session.updateGuideSession({ stepCount: this.steps.length, guideType: "troubleshooting" });
      this.currentStepIndex = Math.min(
        existing.currentStepIndex || 0,
        Math.max(0, this.steps.length - 1)
      );
    }

    document.getElementById("guideLoading").hidden = true;
    document.getElementById("guideContent").hidden = false;
    document.getElementById("guideSubtitle").textContent = this.guide.title;

    const link = document.getElementById("kbDocLink");
    if (link) {
      const url = (this.guide.url || "").trim();
      if (/^https?:\/\//i.test(url)) {
        link.href = url;
        link.hidden = false;
      } else {
        link.removeAttribute("href");
        link.hidden = true;
      }
    }

    Logger.logArticleView({ id: this.guide.id, title: this.guide.title });
    this.renderKbFallback();
    this.render();
  },

  renderKbFallback() {
    const panel = document.getElementById("kbFallbackPanel");
    const btn = document.getElementById("kbFallbackBtn");
    const text = document.getElementById("kbFallbackText");
    if (!panel || !btn) return;

    const session = Session.getGuideSession();
    let kbArticle =
      (session?.fallbackKbId && SearchEngine.getArticleById(session.fallbackKbId)) ||
      GuideResolver.findRelatedKb(this.guide);

    if (!kbArticle) {
      panel.hidden = true;
      return;
    }

    panel.hidden = false;
    if (text) {
      text.textContent =
        "Still stuck? Org KB article: " + kbArticle.title + " (" + kbArticle.id + ")";
    }
    btn.onclick = () => GuideResolver.openItem({ ...kbArticle, type: "kb" });
  },

  bindEvents() {
    document.getElementById("backBtn")?.addEventListener("click", () => this.goBack());
    document.getElementById("continueBtn")?.addEventListener("click", () => this.goNext());
    document.getElementById("resolvedBtn")?.addEventListener("click", () => this.markResolved());
    document.getElementById("escalateBtn")?.addEventListener("click", () => this.escalate());
    document.getElementById("copyNotesBtn")?.addEventListener("click", () => this.copyNotes());
    document.getElementById("agentComments")?.addEventListener("input", () => this.saveAgentComments());
    document.getElementById("startOverBtn")?.addEventListener("click", () => {
      Session.logout();
      SPA.navigate("case");
    });
    document.getElementById("stepImage")?.addEventListener("error", (e) => {
      const fig = document.getElementById("stepFigure");
      if (fig) fig.hidden = true;
      e.target.removeAttribute("src");
    });
  },

  render() {
    this.renderStepPills();
    this.renderInstruction();
    this.renderSessionNotes();
    this.loadAgentComments();
    this.updateNavButtons();
  },

  saveAgentComments() {
    const el = document.getElementById("agentComments");
    if (!el) return;
    Session.updateGuideSession({ agentComments: el.value });
  },

  loadAgentComments() {
    const session = Session.getGuideSession();
    const el = document.getElementById("agentComments");
    if (el && session && document.activeElement !== el) {
      el.value = session.agentComments || "";
    }
  },

  renderStepPills() {
    const container = document.getElementById("stepPills");
    container.innerHTML = "";
    this.steps.forEach((step, i) => {
      const pill = document.createElement("div");
      pill.className = "step-pill";
      if (i < this.currentStepIndex) pill.classList.add("completed");
      else if (i === this.currentStepIndex) pill.classList.add("active");
      else pill.classList.add("pending");
      const label = StepUtils.getLabel(step, i);
      const hasImg = StepUtils.getImage(step, this.imageBasePath);
      pill.innerHTML =
        '<span class="pill-number">' + (i + 1) + "</span>" +
        '<span class="pill-label">' + this.escape(label) + "</span>" +
        (hasImg ? '<span class="pill-visual" title="Has screenshot">&#128247;</span>' : "");
      container.appendChild(pill);
    });
  },

  renderInstruction() {
    const step = this.steps[this.currentStepIndex];
    const text = StepUtils.getText(step);
    document.getElementById("instructionText").textContent = text;

    const fig = document.getElementById("stepFigure");
    const img = document.getElementById("stepImage");
    const caption = document.getElementById("stepImageCaption");
    const tipEl = document.getElementById("stepTip");
    const platformNote = document.getElementById("stepPlatformNote");

    const src = StepUtils.getImage(step, this.imageBasePath);
    if (src && img && fig) {
      img.src = src;
      img.alt = StepUtils.getAlt(step) || text;
      if (caption) caption.textContent = StepUtils.getAlt(step) || "";
      fig.hidden = false;
    } else if (fig) {
      fig.hidden = true;
      if (img) img.removeAttribute("src");
    }

    const tip = StepUtils.getTip(step);
    if (tipEl) {
      if (tip) {
        tipEl.textContent = tip;
        tipEl.hidden = false;
      } else {
        tipEl.hidden = true;
        tipEl.textContent = "";
      }
    }

    const platforms = StepUtils.getPlatforms(step);
    if (platformNote) {
      if (platforms?.length) {
        platformNote.textContent = "Applies to: " + platforms.join(", ");
        platformNote.hidden = false;
      } else {
        platformNote.hidden = true;
      }
    }
  },

  renderSessionNotes() {
    const session = Session.getGuideSession();
    if (!session) return;

    document.getElementById("noteDateTime").textContent = new Date().toLocaleString();
    document.getElementById("noteChatIms").textContent = session.chatIms || "N/A";
    document.getElementById("notePlatform").textContent = session.platform || "N/A";
    document.getElementById("noteEnvironment").textContent = session.environment || "N/A";
    document.getElementById("noteIssue").textContent =
      (session.kbTitle || "") + " (" + (session.kbId || "") + ")";

    const step = this.steps[this.currentStepIndex];
    const stepNum = this.currentStepIndex + 1;
    document.getElementById("noteCurrentStep").textContent =
      stepNum + "/" + this.steps.length + " - " + StepUtils.getLabel(step, this.currentStepIndex);

    const resolutionEl = document.getElementById("noteResolution");
    resolutionEl.textContent = session.resolution || "In Progress";
    resolutionEl.className = "resolution-" + (session.resolution || "in-progress")
      .toLowerCase()
      .replace(/\s+/g, "-");

    const escalatedEl = document.getElementById("noteCaseEscalated");
    if (escalatedEl) {
      escalatedEl.textContent = session.caseEscalated ? "Yes" : "No";
      escalatedEl.className = session.caseEscalated ? "resolution-escalated" : "";
    }

    const stepsList = document.getElementById("noteStepsTaken");
    stepsList.innerHTML = "";
    if (session.stepsTaken?.length) {
      session.stepsTaken.forEach((s) => {
        const li = document.createElement("li");
        li.textContent = s.text;
        stepsList.appendChild(li);
      });
    } else {
      const li = document.createElement("li");
      li.textContent = "No steps recorded yet.";
      li.className = "muted";
      stepsList.appendChild(li);
    }
  },

  updateNavButtons() {
    document.getElementById("backBtn").disabled = this.currentStepIndex === 0;
    document.getElementById("continueBtn").hidden = this.currentStepIndex >= this.steps.length - 1;
  },

  recordCurrentStep() {
    const stepText = StepUtils.getText(this.steps[this.currentStepIndex]);
    Session.recordStepTaken(this.currentStepIndex, stepText);
    Logger.logStepProgress(
      this.guide.id,
      this.guide.title,
      this.currentStepIndex + 1,
      stepText
    );
  },

  goBack() {
    if (this.currentStepIndex > 0) {
      this.currentStepIndex--;
      Session.updateGuideSession({ currentStepIndex: this.currentStepIndex });
      this.render();
    }
  },

  goNext() {
    this.recordCurrentStep();
    if (this.currentStepIndex < this.steps.length - 1) {
      this.currentStepIndex++;
      Session.updateGuideSession({ currentStepIndex: this.currentStepIndex });
      this.render();
    } else {
      this.showToast("Last step reached. Mark as resolved or escalate.");
      this.renderSessionNotes();
    }
  },

  markResolved() {
    this.recordCurrentStep();
    Session.setResolution("Resolved");
    Logger.logResolution(this.guide.id, this.guide.title);
    this.renderSessionNotes();
    this.showToast("Issue marked as resolved.");
  },

  escalate() {
    this.recordCurrentStep();
    Session.setEscalated();
    Logger.logEscalation(
      "Case escalated at step " + (this.currentStepIndex + 1),
      this.guide.id,
      this.guide.title
    );
    this.renderSessionNotes();
    this.showToast("Case escalated. Use Copy Notes to paste into your ticket.");
  },

  async copyNotes() {
    this.saveAgentComments();
    const ok = await Session.copyNotes();
    if (ok) {
      const session = Session.getGuideSession();
      Logger.logCopyNotes(session?.kbId, session?.kbTitle);
      this.showToast("Notes copied to clipboard.");
    } else {
      this.showToast("Could not copy notes. Please try again.");
    }
  },

  showError(msg) {
    document.getElementById("guideLoading").hidden = true;
    const el = document.getElementById("guideError");
    el.textContent = msg;
    el.hidden = false;
  },

  showToast(msg) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  },

  escape(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }
};

if (typeof window !== "undefined") {
